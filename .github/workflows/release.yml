name: Release Bundle

on:
  push:
    tags:
      - "v*"
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Optional release tag, for example v0.1.0. Empty builds workflow artifacts only."
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-bundle-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Bundle (${{ matrix.platform }})
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ""
            rust-targets: ""
          - platform: windows-latest
            args: ""
            rust-targets: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux bundle dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libkrb5-dev

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          version="$(node -p "require('./package.json').version")"
          if [ "${{ github.event_name }}" = "release" ]; then
            tag="${{ github.event.release.tag_name }}"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            tag="${GITHUB_REF_NAME}"
          else
            tag="${{ inputs.tag }}"
          fi

          if [ -n "$tag" ] && [ "$tag" != "v$version" ]; then
            echo "Release tag '$tag' must match package.json version 'v$version'." >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Build and upload release bundles
        if: steps.version.outputs.tag != ''
        uses: tauri-apps/tauri-action@action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ steps.version.outputs.tag }}
          releaseName: Taomni v${{ steps.version.outputs.version }}
          releaseBody: Desktop bundles for Taomni v${{ steps.version.outputs.version }}.
          generateReleaseNotes: true
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
          uploadWorkflowArtifacts: true
          workflowArtifactNamePattern: "[name]-[version]-[platform]-[arch]-[bundle]"
          args: ${{ matrix.args }}

      - name: Build workflow bundles
        if: steps.version.outputs.tag == ''
        uses: tauri-apps/tauri-action@action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          uploadWorkflowArtifacts: true
          workflowArtifactNamePattern: "[name]-[version]-[platform]-[arch]-[bundle]"
          args: ${{ matrix.args }}
