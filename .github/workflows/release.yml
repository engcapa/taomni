name: Release Bundle

on:
  push:
    tags:
      - "v*"
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Optional release tag, for example v0.1.0. Empty builds workflow artifacts only."
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-bundle-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # Linux / Windows – unchanged matrix build
  # ---------------------------------------------------------------------------
  build:
    name: Bundle (${{ matrix.platform }})
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Stay on 22.04 so the Linux bundle keeps glibc 2.35 and runs on
          # Ubuntu 22.04 / Debian bookworm-class distros. Stock jammy PipeWire
          # (~0.3.48) headers are too old for libspa 0.9 (missing
          # spa_video_info_raw.flags); we install a newer PipeWire from source
          # for build only (see "Install PipeWire 1.x for libspa" step).
          - platform: ubuntu-22.04
            args: "--features native-av"
            rust-targets: ""
          - platform: windows-latest
            args: ""
            rust-targets: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux bundle dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          # Base bundle deps + LanChat native A/V (native-av feature): nasm builds
          # openh264's x86 asm, libasound2-dev is cpal's ALSA backend, libv4l-dev
          # is nokhwa's camera backend. X11 screen capture uses libxcb (already
          # present on the runner).
          # meson/ninja/libclang: used to build a newer PipeWire for libspa 0.9.
          # libpipewire-0.3-dev: stock jammy headers (too old alone); kept so
          # related packages are present; overlaid by the next step.
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libkrb5-dev \
            nasm \
            libasound2-dev \
            libv4l-dev \
            libpipewire-0.3-dev \
            libclang-dev \
            libdbus-1-dev \
            libudev-dev \
            meson \
            ninja-build \
            pkg-config

      # xcap → pipewire → libspa 0.9.x expects spa_video_info_raw.flags and
      # modifier:u64. Ubuntu 22.04's PipeWire ~0.3.48 headers lack those fields.
      # Build PipeWire 1.0.x from source (against jammy's glibc 2.35) and install
      # to /usr/local so the release binary stays runnable on 22.04+.
      - name: Install PipeWire 1.x for libspa (Ubuntu 22.04)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          set -euo pipefail
          PW_VER=1.0.9
          workdir="${RUNNER_TEMP:-/tmp}/pipewire-src"
          rm -rf "$workdir"
          mkdir -p "$workdir"
          # GitHub mirror of the freedsktop tag (stable for CI downloads).
          curl -fsSL "https://github.com/PipeWire/pipewire/archive/refs/tags/${PW_VER}.tar.gz" \
            | tar -xz -C "$workdir" --strip-components=1
          cd "$workdir"
          meson setup build \
            --prefix=/usr/local \
            --buildtype=release \
            -Ddocs=disabled \
            -Dman=disabled \
            -Dtests=disabled \
            -Dexamples=disabled \
            -Dinstalled_tests=disabled \
            -Dsession-managers=[] \
            -Dsystemd=disabled \
            -Dselinux=disabled \
            -Dpipewire-alsa=disabled \
            -Dpipewire-jack=disabled \
            -Dpipewire-v4l2=disabled \
            -Djack=disabled \
            -Dbluez5=disabled \
            -Dffmpeg=disabled \
            -Dlibcamera=disabled \
            -Droc=disabled \
            -Dlv2=disabled \
            -Dsdl2=disabled \
            -Dsndfile=disabled \
            -Dlibpulse=disabled \
            -Davahi=disabled \
            -Decho-cancel-webrtc=disabled \
            -Dgstreamer=disabled \
            -Dreadline=disabled \
            -Draop=disabled \
            -Dgsettings=disabled \
            -Dlibcanberra=disabled \
            -Dflatpak=disabled \
            -Drlimits-install=false
          meson compile -C build
          sudo meson install -C build
          sudo ldconfig
          # Prefer /usr/local headers and libs over stock jammy packages.
          {
            echo "PKG_CONFIG_PATH=/usr/local/lib/x86_64-linux-gnu/pkgconfig:/usr/local/lib/pkgconfig:${PKG_CONFIG_PATH:-}"
            echo "LIBRARY_PATH=/usr/local/lib/x86_64-linux-gnu:/usr/local/lib:${LIBRARY_PATH:-}"
            echo "LD_LIBRARY_PATH=/usr/local/lib/x86_64-linux-gnu:/usr/local/lib:${LD_LIBRARY_PATH:-}"
          } >> "$GITHUB_ENV"
          export PKG_CONFIG_PATH="/usr/local/lib/x86_64-linux-gnu/pkgconfig:/usr/local/lib/pkgconfig:${PKG_CONFIG_PATH:-}"
          echo "libpipewire version: $(pkg-config --modversion libpipewire-0.3)"
          pkg-config --cflags --libs libpipewire-0.3
          # Sanity-check headers include the fields libspa 0.9 needs.
          grep -q 'uint32_t flags' /usr/local/include/spa-0.2/spa/param/video/raw.h
          grep -q 'uint64_t modifier' /usr/local/include/spa-0.2/spa/param/video/raw.h

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          version="$(node -p "require('./package.json').version")"
          if [ "${{ github.event_name }}" = "release" ]; then
            tag="${{ github.event.release.tag_name }}"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            tag="${GITHUB_REF_NAME}"
          else
            tag="${{ inputs.tag }}"
          fi

          if [ -n "$tag" ] && [ "$tag" != "v$version" ]; then
            echo "Release tag '$tag' must match package.json version 'v$version'." >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Build and upload release bundles
        id: tauri_release
        if: steps.version.outputs.tag != ''
        uses: tauri-apps/tauri-action@action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ steps.version.outputs.tag }}
          releaseName: Taomni v${{ steps.version.outputs.version }}
          releaseBody: Desktop bundles for Taomni v${{ steps.version.outputs.version }}.
          generateReleaseNotes: true
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
          args: ${{ matrix.args }}

      - name: Collect release workflow artifacts
        if: steps.version.outputs.tag != ''
        shell: bash
        env:
          TAURI_ACTION_ARTIFACT_PATHS: ${{ steps.tauri_release.outputs.artifactPaths }}
          TAURI_ACTION_ARTIFACT_OUT_DIR: tauri-artifacts/${{ matrix.platform }}
        run: node scripts/collect-tauri-action-artifacts.mjs

      - name: Upload release workflow artifacts
        if: steps.version.outputs.tag != ''
        uses: actions/upload-artifact@v4
        with:
          name: taomni-${{ steps.version.outputs.version }}-${{ matrix.platform }}
          path: tauri-artifacts/${{ matrix.platform }}
          if-no-files-found: error

      - name: Build workflow bundles
        id: tauri_workflow
        if: steps.version.outputs.tag == ''
        uses: tauri-apps/tauri-action@action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          args: ${{ matrix.args }}

      - name: Collect workflow artifacts
        if: steps.version.outputs.tag == ''
        shell: bash
        env:
          TAURI_ACTION_ARTIFACT_PATHS: ${{ steps.tauri_workflow.outputs.artifactPaths }}
          TAURI_ACTION_ARTIFACT_OUT_DIR: tauri-artifacts/${{ matrix.platform }}
        run: node scripts/collect-tauri-action-artifacts.mjs

      - name: Upload workflow artifacts
        if: steps.version.outputs.tag == ''
        uses: actions/upload-artifact@v4
        with:
          name: taomni-${{ steps.version.outputs.version }}-${{ matrix.platform }}
          path: tauri-artifacts/${{ matrix.platform }}
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # macOS – single arm64 runner, cross-compiles both architectures
  # ---------------------------------------------------------------------------
  build-macos:
    name: Bundle (macOS)
    runs-on: macos-latest          # arm64 (Apple Silicon) runner

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      # -----------------------------------------------------------------------
      # Install MIT Kerberos for both architectures.
      #
      # macOS ships Apple's GSS.framework (a Heimdal fork) whose public headers
      # do NOT declare the IOV functions (gss_wrap_iov, gss_unwrap_iov,
      # gss_wrap_iov_length) that libgssapi 0.11 unconditionally imports.
      # Using MIT Kerberos (which fully supports IOV) fixes the build.
      #
      # arm64 : native Homebrew at /opt/homebrew
      # x86_64: Homebrew under Rosetta 2 at /usr/local
      # -----------------------------------------------------------------------
      - name: Install MIT Kerberos (arm64 – native)
        run: brew install krb5

      - name: Install MIT Kerberos (x86_64 – Rosetta 2)
        run: |
          # Bootstrap x86_64 Homebrew if it isn't already present
          if [ ! -x /usr/local/bin/brew ]; then
            arch -x86_64 /bin/bash -c \
              "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          fi
          arch -x86_64 /usr/local/bin/brew install krb5

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          version="$(node -p "require('./package.json').version")"
          if [ "${{ github.event_name }}" = "release" ]; then
            tag="${{ github.event.release.tag_name }}"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            tag="${GITHUB_REF_NAME}"
          else
            tag="${{ inputs.tag }}"
          fi

          if [ -n "$tag" ] && [ "$tag" != "v$version" ]; then
            echo "Release tag '$tag' must match package.json version 'v$version'." >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      # ---------- aarch64-apple-darwin (native) ----------
      - name: Build and upload release bundle (aarch64)
        id: tauri_macos_aarch64_release
        if: steps.version.outputs.tag != ''
        uses: tauri-apps/tauri-action@action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Point libgssapi-sys at Homebrew MIT Kerberos (arm64)
          LIBGSSAPI_IMPL: mit
          LIBGSSAPI_PREFIX: /opt/homebrew/opt/krb5
          PKG_CONFIG_PATH: /opt/homebrew/opt/krb5/lib/pkgconfig
        with:
          tagName: ${{ steps.version.outputs.tag }}
          releaseName: Taomni v${{ steps.version.outputs.version }}
          releaseBody: Desktop bundles for Taomni v${{ steps.version.outputs.version }}.
          generateReleaseNotes: true
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
          args: --target aarch64-apple-darwin

      - name: Collect release workflow artifacts (aarch64)
        if: steps.version.outputs.tag != ''
        shell: bash
        env:
          TAURI_ACTION_ARTIFACT_PATHS: ${{ steps.tauri_macos_aarch64_release.outputs.artifactPaths }}
          TAURI_ACTION_ARTIFACT_OUT_DIR: tauri-artifacts/macos-aarch64
        run: node scripts/collect-tauri-action-artifacts.mjs

      - name: Upload release workflow artifacts (aarch64)
        if: steps.version.outputs.tag != ''
        uses: actions/upload-artifact@v4
        with:
          name: taomni-${{ steps.version.outputs.version }}-macos-aarch64
          path: tauri-artifacts/macos-aarch64
          if-no-files-found: error

      - name: Build workflow bundle (aarch64)
        id: tauri_macos_aarch64_workflow
        if: steps.version.outputs.tag == ''
        uses: tauri-apps/tauri-action@action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          LIBGSSAPI_IMPL: mit
          LIBGSSAPI_PREFIX: /opt/homebrew/opt/krb5
          PKG_CONFIG_PATH: /opt/homebrew/opt/krb5/lib/pkgconfig
        with:
          args: --target aarch64-apple-darwin

      - name: Collect workflow artifacts (aarch64)
        if: steps.version.outputs.tag == ''
        shell: bash
        env:
          TAURI_ACTION_ARTIFACT_PATHS: ${{ steps.tauri_macos_aarch64_workflow.outputs.artifactPaths }}
          TAURI_ACTION_ARTIFACT_OUT_DIR: tauri-artifacts/macos-aarch64
        run: node scripts/collect-tauri-action-artifacts.mjs

      - name: Upload workflow artifacts (aarch64)
        if: steps.version.outputs.tag == ''
        uses: actions/upload-artifact@v4
        with:
          name: taomni-${{ steps.version.outputs.version }}-macos-aarch64
          path: tauri-artifacts/macos-aarch64
          if-no-files-found: error

      # ---------- x86_64-apple-darwin (cross-compile) ----------
      - name: Build and upload release bundle (x86_64)
        id: tauri_macos_x86_64_release
        if: steps.version.outputs.tag != ''
        uses: tauri-apps/tauri-action@action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Point libgssapi-sys at x86_64 MIT Kerberos under /usr/local
          LIBGSSAPI_IMPL: mit
          LIBGSSAPI_PREFIX: /usr/local/opt/krb5
          PKG_CONFIG_PATH: /usr/local/opt/krb5/lib/pkgconfig
          PKG_CONFIG_ALLOW_CROSS: "1"
        with:
          tagName: ${{ steps.version.outputs.tag }}
          releaseName: Taomni v${{ steps.version.outputs.version }}
          releaseBody: Desktop bundles for Taomni v${{ steps.version.outputs.version }}.
          generateReleaseNotes: true
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
          args: --target x86_64-apple-darwin

      - name: Collect release workflow artifacts (x86_64)
        if: steps.version.outputs.tag != ''
        shell: bash
        env:
          TAURI_ACTION_ARTIFACT_PATHS: ${{ steps.tauri_macos_x86_64_release.outputs.artifactPaths }}
          TAURI_ACTION_ARTIFACT_OUT_DIR: tauri-artifacts/macos-x86_64
        run: node scripts/collect-tauri-action-artifacts.mjs

      - name: Upload release workflow artifacts (x86_64)
        if: steps.version.outputs.tag != ''
        uses: actions/upload-artifact@v4
        with:
          name: taomni-${{ steps.version.outputs.version }}-macos-x86_64
          path: tauri-artifacts/macos-x86_64
          if-no-files-found: error

      - name: Build workflow bundle (x86_64)
        id: tauri_macos_x86_64_workflow
        if: steps.version.outputs.tag == ''
        uses: tauri-apps/tauri-action@action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          LIBGSSAPI_IMPL: mit
          LIBGSSAPI_PREFIX: /usr/local/opt/krb5
          PKG_CONFIG_PATH: /usr/local/opt/krb5/lib/pkgconfig
          PKG_CONFIG_ALLOW_CROSS: "1"
        with:
          args: --target x86_64-apple-darwin

      - name: Collect workflow artifacts (x86_64)
        if: steps.version.outputs.tag == ''
        shell: bash
        env:
          TAURI_ACTION_ARTIFACT_PATHS: ${{ steps.tauri_macos_x86_64_workflow.outputs.artifactPaths }}
          TAURI_ACTION_ARTIFACT_OUT_DIR: tauri-artifacts/macos-x86_64
        run: node scripts/collect-tauri-action-artifacts.mjs

      - name: Upload workflow artifacts (x86_64)
        if: steps.version.outputs.tag == ''
        uses: actions/upload-artifact@v4
        with:
          name: taomni-${{ steps.version.outputs.version }}-macos-x86_64
          path: tauri-artifacts/macos-x86_64
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Compose a single, complete latest.json for tauri-plugin-updater.
  #
  # Each platform build uploads its own updater bundles + .sig files, but the
  # updater needs ONE latest.json listing every platform. The per-arch macOS
  # *.app.tar.gz assets share a filename and would collide on the release, so we
  # rebuild from the uniquely-named per-arch workflow artifacts: re-upload each
  # updater bundle under an arch-tagged name and overwrite latest.json. Runs
  # after both build jobs. See claudedocs/auto-update-plan.md (must be verified
  # by hand on the first signed release).
  # ---------------------------------------------------------------------------
  finalize-updater-manifest:
    name: Compose latest.json
    needs: [build, build-macos]
    runs-on: ubuntu-22.04
    if: github.event_name == 'release' || github.ref_type == 'tag' || inputs.tag != ''
    steps:
      - name: Resolve release tag
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            tag="${{ github.event.release.tag_name }}"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            tag="${GITHUB_REF_NAME}"
          else
            tag="${{ inputs.tag }}"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Download workflow artifacts
        if: steps.meta.outputs.tag != ''
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Rebuild and upload latest.json
        if: steps.meta.outputs.tag != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.meta.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          BASE_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}"
          NOTES="$(gh release view "$TAG" --json body --jq '.body // ""' 2>/dev/null || true)"
          PUB_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          platforms='{}'

          arch_of() { case "$(echo "$1" | tr 'A-Z' 'a-z')" in *aarch64*|*arm64*) echo aarch64;; *) echo x86_64;; esac; }

          record() {
            # key, sig file, bundle file, release asset name
            local key="$1" sig="$2" bundle="$3" asset="$4"
            [ -f "$bundle" ] || { echo "::warning::missing bundle $bundle for $key"; return; }
            cp -f "$bundle" "/tmp/$asset"
            gh release upload "$TAG" "/tmp/$asset" --clobber
            local sig_content; sig_content="$(cat "$sig")"
            platforms="$(jq -n --argjson p "$platforms" --arg k "$key" \
              --arg url "${BASE_URL}/${asset}" --arg sig "$sig_content" \
              '$p + {($k): {signature:$sig, url:$url}}')"
          }

          # Pass 1: macOS, Linux, and Windows NSIS (NSIS is preferred over MSI).
          while IFS= read -r sig; do
            bundle="${sig%.sig}"; a="$(arch_of "$sig")"
            case "$bundle" in
              *.app.tar.gz)
                [ "$a" = aarch64 ] && asset="Taomni_${VERSION}_aarch64.app.tar.gz" || asset="Taomni_${VERSION}_x64.app.tar.gz"
                record "darwin-${a}" "$sig" "$bundle" "$asset" ;;
              *.AppImage.tar.gz)
                [ "$a" = aarch64 ] && asset="Taomni_${VERSION}_aarch64.AppImage.tar.gz" || asset="Taomni_${VERSION}_amd64.AppImage.tar.gz"
                record "linux-${a}" "$sig" "$bundle" "$asset" ;;
              *-setup.nsis.zip)
                [ "$a" = aarch64 ] && asset="Taomni_${VERSION}_arm64-setup.nsis.zip" || asset="Taomni_${VERSION}_x64-setup.nsis.zip"
                record "windows-${a}" "$sig" "$bundle" "$asset" ;;
            esac
          done < <(find artifacts -type f -name '*.sig' | sort)

          # Pass 2: MSI fills only the Windows entries NSIS didn't provide.
          while IFS= read -r sig; do
            bundle="${sig%.sig}"; a="$(arch_of "$sig")"; key="windows-${a}"
            if ! echo "$platforms" | jq -e --arg k "$key" 'has($k)' >/dev/null; then
              [ "$a" = aarch64 ] && asset="Taomni_${VERSION}_arm64_en-US.msi.zip" || asset="Taomni_${VERSION}_x64_en-US.msi.zip"
              record "$key" "$sig" "$bundle" "$asset"
            fi
          done < <(find artifacts -type f -name '*.msi.zip.sig' | sort)

          jq -n --arg v "$VERSION" --arg n "$NOTES" --arg d "$PUB_DATE" --argjson p "$platforms" \
            '{version:$v, notes:$n, pub_date:$d, platforms:$p}' > latest.json

          echo "Composed latest.json:"; cat latest.json
          count="$(jq '.platforms | length' latest.json)"
          echo "Platform entries: $count"
          [ "$count" -gt 0 ] || { echo "::error::latest.json has no platforms"; exit 1; }
          gh release upload "$TAG" latest.json --clobber
