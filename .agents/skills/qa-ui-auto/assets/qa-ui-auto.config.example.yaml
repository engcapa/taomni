# qa-ui-auto configuration
# Copy this file to project root as `qa-ui-auto.config.yaml` and fill in.
# Secrets MUST come from environment variables: ${env.VAR_NAME}.
# Both ${cfg.x.y} and the legacy ${cfg:x.y} forms are accepted by the runner.

app:
  base_url: http://localhost:5000   # Vite dev server in browser mode
  mode: browser                     # browser | native
  # native_binary: ./src-tauri/target/debug/taomni.exe   # used when mode=native on Windows

worker:
  parallel: 4                       # max browser worker processes (browser mode only)

webdriver:
  host: 127.0.0.1
  port: 4444
  tauri_driver: tauri-driver        # cargo install tauri-driver --locked
  # native_driver: C:/path/to/msedgedriver.exe  # optional; otherwise PATH
  startup_timeout: 20
  isolate_app_data: true            # use a per-run app-data directory

ssh:
  host: 127.0.0.1
  port: 2222
  user: testuser
  password: ${env.QA_SSH_PASSWORD}
  # private_key_path: ~/.ssh/id_ed25519
  # private_key_passphrase: ${env.QA_SSH_KEY_PASSPHRASE}

sftp:
  host: 127.0.0.1
  port: 2222
  user: testuser
  password: ${env.QA_SSH_PASSWORD}
  remote_test_dir: /config/qa-ui-auto

# Note: the qa-ui-auto runner does not start any docker fixtures. If the
# host above is unreachable, the TCP probe fails and SSH/SFTP cases skip.
# Fix the network rather than letting the runner fall back.

report:
  dir: qa-ui-auto-report
  keep_runs: 5
