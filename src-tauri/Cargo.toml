[package]
name = "newmob"
version = "0.1.0"
description = "Cross-platform remote connection manager"
authors = ["engcapa"]
license = "MIT"
edition = "2021"
rust-version = "1.77.2"

[lib]
name = "newmob_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-log = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
uuid = { version = "1", features = ["v4"] }
tracing = "0.1"
tracing-subscriber = "0.3"
log = "0.4"
portable-pty = "0.8"
base64 = "0.22"
rusqlite = { version = "0.31", features = ["bundled"] }
chrono = "0.4"
russh = "0.46"
russh-keys = "0.46"
russh-sftp = "2"
tokio-util = { version = "0.7", features = ["compat", "io"] }
futures = "0.3"
async-trait = "0.1"
thiserror = "1"
reqwest = { version = "0.12", features = ["rustls-tls", "json", "stream"], default-features = false }
heck = "0.5"
regex = "1"
rig-core = { version = "=0.37.0", default-features = false, features = ["derive"] }
shellexpand = "3"
libc = "0.2"
font-kit = "0.14"
dirs = "5"
flate2 = "1"
tungstenite = "0.24"
tokio-tungstenite = "0.24"
aes = "0.8"
des = "0.8"
generic-array = "0.14"
rsa = "0.9"
sha2 = "0.10"
sha1 = "0.10"
rand = "0.8"
x509-cert = "0.2"
arboard = "3"
argon2 = "0.5"
aes-gcm = "0.10"
zeroize = { version = "1", features = ["zeroize_derive"] }

[target.'cfg(windows)'.dependencies]
winapi = { version = "0.3", features = ["fileapi", "commdlg"] }

[dev-dependencies]
tempfile = "3"
