[package]
name = "newmob"
version = "0.1.0"
description = "Cross-platform remote connection manager"
authors = ["zhyhang"]
license = "MIT"
edition = "2021"
rust-version = "1.77.2"

[lib]
name = "newmob_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-log = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
uuid = { version = "1", features = ["v4"] }
tracing = "0.1"
tracing-subscriber = "0.3"
log = "0.4"
portable-pty = "0.8"
base64 = "0.22"
rusqlite = { version = "0.31", features = ["bundled"] }
chrono = "0.4"
russh = "0.46"
russh-keys = "0.46"
russh-sftp = "2"
tokio-util = { version = "0.7", features = ["compat", "io"] }
futures = "0.3"
async-trait = "0.1"
shellexpand = "3"
libc = "0.2"
font-kit = "0.14"
dirs = "5"

[target.'cfg(windows)'.dependencies]
winapi = { version = "0.3", features = ["fileapi"] }
