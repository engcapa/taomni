[package]
edition = "2024"
name = "winscard"
version = "0.3.0"
authors = ["Devolutions Inc. <infos@devolutions.net>"]
build = false
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "A Rust implementation of WinSCard"
homepage = "https://github.com/devolutions/sspi-rs"
readme = "README.md"
license = "MIT/Apache-2.0"
repository = "https://github.com/devolutions/sspi-rs"
resolver = "2"

[features]
std = [
    "tracing/std",
    "base64",
    "picky-asn1-der",
]

[lib]
name = "winscard"
path = "src/lib.rs"

[dependencies.base64]
version = "0.22"
optional = true

[dependencies.bitflags]
version = "2.9"

[dependencies.crypto-bigint]
version = "0.7.3"
features = ["alloc"]
default-features = false

[dependencies.flate2]
version = "1.1"
default-features = false

[dependencies.iso7816]
version = "0.1"

[dependencies.iso7816-tlv]
version = "0.4"

[dependencies.num-derive]
version = "0.4"

[dependencies.num-traits]
version = "0.2"
default-features = false

[dependencies.picky]
version = "=7.0.0-rc.23"
features = ["x509"]
default-features = false

[dependencies.picky-asn1-der]
version = "0.5"
optional = true

[dependencies.picky-asn1-x509]
version = "0.15"

[dependencies.rsa]
version = "=0.10.0-rc.18"
features = ["hazmat"]
default-features = false

[dependencies.sha1]
version = "0.11"
default-features = false

[dependencies.time]
version = "0.3"
features = ["formatting"]
default-features = false

[dependencies.tracing]
version = "0.1"
features = ["attributes"]
default-features = false

[dependencies.uuid]
version = "1.18"
features = ["v4"]
default-features = false

[dev-dependencies.proptest]
version = "1.6"

[dev-dependencies.rand]
version = "0.10.0-rc.6"

[target.'cfg(not(target_arch = "wasm32"))'.dependencies.flate2]
