id: TC-AI-004
title: Native web search caps + ClaudeCode integration both surface
description: |
  Companion to TC-AI-003: focuses on the provider-native search side
  (provider_caps command + ClaudeCodePanel) plus the Models advanced panel
  (mirror selector + CUDA pack toggle). Verifies the §11.4 mirror radios and
  §11.6 CUDA-pack section render so users can pick their download source
  before launching real downloads.
covers: [F-AI-2.5, F-AI-2.6, F-AI-11]
tags: [ai, native-search, claude-code, p2]
modes: [browser]
fixtures: [reset_db]
timeout_sec: 45
steps:
  - open: ${cfg.app.base_url}
  - wait_for: '[data-testid="ribbon-settings"]'
  - click: '[data-testid="ribbon-settings"]'
  - wait_for: 'text=AI 设置'
  - assert_visible: 'text="AI 设置"'
  # Models advanced panel: mirror radios
  - assert_visible: 'text="模型分发"'
  - assert_visible: 'text="ModelScope 优先"'
  - assert_visible: 'text="GitHub 直连"'
  - assert_visible: 'text="gh-proxy 代理"'
  - assert_visible: 'text="自定义 base URL"'
  # Chat history retention
  - assert_visible: 'text="对话历史管理"'
  - assert_visible: 'text="保留天数"'
  - fill:
      selector: 'input[aria-label="Chat history retention days"]'
      value: '30'
  - screenshot: ai-004-native-and-cc.png
