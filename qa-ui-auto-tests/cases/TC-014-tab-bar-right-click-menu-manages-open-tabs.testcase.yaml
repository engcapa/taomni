id: TC-014
title: Tab bar right-click menu manages open tabs and tab-strip toolbar exposes split / multiexec / more
covers: [F1.5]
tags: [legacy-imported, main, p1, right-menu, tabs]
modes: [browser]
fixtures: [reset_db]
steps:
  - open: "${cfg.app.base_url}"
  - wait_for: "[data-testid=\"tab-bar\"]"
  - click: "[data-testid=\"ribbon-settings\"]"
  - wait_for: "[data-testid=\"settings-panel\"]"
  - right_click: "[data-testid=\"tab-item\"]"
  - wait_for: "[data-testid=\"context-menu\"]"
  - assert_visible: "text=\"Close\""
  - assert_visible: "text=\"Close others\""
  - assert_visible: "text=\"Close all\""
  - assert_visible: "text=\"Duplicate tab\""
  - press: Escape
  # Tab-strip toolbar: split-view, multiexec, more
  - assert_visible: '[data-testid="tab-split-view"]'
  - assert_enabled: '[data-testid="tab-split-view"]'
  - click: '[data-testid="tab-multiexec-toggle"]'
  - wait: 0.5
  - click: '[data-testid="tab-multiexec-toggle"]'
  - wait: 0.5
  - click: '[data-testid="tab-more"]'
  - wait_for: "[data-testid=\"context-menu\"]"
  - assert_visible: "text=\"New local terminal\""
  - screenshot: 014-tab-right-menu.png
