id: TC-109
title: Terminal context menu exposes font size controls only
description: |
  Covers the terminal right-click Font size submenu after font family and
  ligature controls moved to the shared Terminal Appearance settings.
covers: [F4.2]
tags: [smoke, p1, terminal, right-menu, font-size]
modes: [browser]
fixtures: [reset_db]
timeout_sec: 45
steps:
  - open: "${cfg.app.base_url}"
  - click: "[data-testid=\"welcome-open-local-terminal\"]"
  - wait_for: "[data-testid=\"terminal-pane\"]"
  - right_click: {selector: "[data-testid=\"terminal-pane\"]", position: {x: 24, y: 24}}
  - wait_for: "[data-testid=\"context-menu\"]"
  - assert_visible: '[data-testid="context-menu-item-font-size"]'
  - assert_not_visible: '[data-testid="context-menu-item-font-settings"]'
  - assert_not_visible: 'text="More fonts..."'
  - assert_not_visible: 'text="Display font ligatures"'
  - hover: '[data-testid="context-menu-item-font-size"]'
  - wait_for: 'text="Increase font size"'
  - assert_visible: 'text="Decrease font size"'
  - assert_visible: 'text="Reset font size to default"'
  - screenshot: 109-terminal-font-size-menu.png
