id: TC-109
title: Terminal context menu exposes zoom and appearance controls
description: |
  Covers the terminal right-click top-level zoom actions and the unified
  Appearance panel after the duplicate Font size submenu was removed.
covers: [F4.2]
tags: [smoke, p1, terminal, right-menu, font-size]
modes: [browser]
fixtures: [reset_db]
timeout_sec: 45
steps:
  - open: "${cfg.app.base_url}"
  - click: "[data-testid=\"welcome-open-local-terminal\"]"
  - wait_for: "[data-testid=\"terminal-pane\"]"
  - right_click: {selector: "[data-testid=\"terminal-pane\"]", position: {x: 24, y: 24}}
  - wait_for: "[data-testid=\"context-menu\"]"
  - assert_visible: 'text="Zoom in"'
  - assert_visible: 'text="Zoom out"'
  - assert_visible: 'text="Reset zoom"'
  - assert_not_visible: '[data-testid="context-menu-item-font-size"]'
  - assert_visible: '[data-testid="context-menu-item-appearance"]'
  - assert_not_visible: '[data-testid="context-menu-item-font-settings"]'
  - assert_not_visible: 'text="More fonts..."'
  - assert_not_visible: 'text="Display font ligatures"'
  - hover: '[data-testid="context-menu-item-appearance"]'
  - wait_for: '[data-testid="terminal-context-font-size"]'
  - assert_visible: '[data-testid="terminal-context-font-select"]'
  - screenshot: 109-terminal-appearance-menu.png
