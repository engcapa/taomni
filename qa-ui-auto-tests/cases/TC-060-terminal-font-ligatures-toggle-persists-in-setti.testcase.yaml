id: TC-060
title: Terminal font ligatures toggle persists in settings
covers: [F5.2]
tags: [font, legacy-imported, ligatures, p1, terminal]
modes: [browser]
fixtures: [reset_db]
steps:
  - open: "${cfg.app.base_url}"
  - click: "[data-testid=\"ribbon-settings\"]"
  - wait_for: "[data-testid=\"settings-panel\"]"
  - click: 'input[aria-label="Enable font ligatures"]'
  - wait: 1
  - assert_localstorage: {key: "taomni.terminalProfile.v1", contains: "fontLigatures"}
  - screenshot: 060-terminal-font-ligatures.png
