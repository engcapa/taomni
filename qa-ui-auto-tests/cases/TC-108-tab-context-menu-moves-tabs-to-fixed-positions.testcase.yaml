id: TC-108
title: Tab context menu moves tabs to fixed positions
description: |
  Covers the v0.1.24 tab context-menu move actions added after the feature
  catalog was last updated: Move to last, Move left, Move to first, and Move right.
covers: [F1.5]
tags: [smoke, p1, main, right-menu, tabs]
modes: [browser]
fixtures: [reset_db]
timeout_sec: 45
steps:
  - open: "${cfg.app.base_url}"
  - click: "[data-testid=\"welcome-open-local-terminal\"]"
  - wait_for: "[data-testid=\"terminal-pane\"]"
  - click: "[data-testid=\"new-local-terminal\"]"
  - click: "[data-testid=\"new-local-terminal\"]"
  - assert_count: {selector: '[data-testid="tab-item"]', min: 4}
  - right_click: '[data-testid="tab-item"][data-tab-title="Terminal 1"]'
  - wait_for: "[data-testid=\"context-menu\"]"
  - assert_menu_items: ["Move to first", "Move left", "Move right", "Move to last"]
  - click: '[data-testid="context-menu-item-move-to-last"]'
  - wait: 0.5
  - assert_attribute:
      selector: '[data-testid="tab-item"] >> nth=3'
      name: "data-tab-title"
      equals: "Terminal 1"
  - right_click: '[data-testid="tab-item"][data-tab-title="Terminal 1"]'
  - wait_for: "[data-testid=\"context-menu\"]"
  - click: '[data-testid="context-menu-item-move-left"]'
  - wait: 0.5
  - assert_attribute:
      selector: '[data-testid="tab-item"] >> nth=2'
      name: "data-tab-title"
      equals: "Terminal 1"
  - right_click: '[data-testid="tab-item"][data-tab-title="Terminal 1"]'
  - wait_for: "[data-testid=\"context-menu\"]"
  - click: '[data-testid="context-menu-item-move-to-first"]'
  - wait: 0.5
  - assert_attribute:
      selector: '[data-testid="tab-item"] >> nth=0'
      name: "data-tab-title"
      equals: "Terminal 1"
  - right_click: '[data-testid="tab-item"][data-tab-title="Terminal 1"]'
  - wait_for: "[data-testid=\"context-menu\"]"
  - click: '[data-testid="context-menu-item-move-right"]'
  - wait: 0.5
  - assert_attribute:
      selector: '[data-testid="tab-item"] >> nth=1'
      name: "data-tab-title"
      equals: "Terminal 1"
  - screenshot: 108-tab-context-menu-move-actions.png
