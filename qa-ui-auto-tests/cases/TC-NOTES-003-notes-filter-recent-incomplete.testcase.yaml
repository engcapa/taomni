id: TC-NOTES-003
title: Notes filter — recent-incomplete vs completed
description: |
  Verifies the notes filter views (F-TAO-1): a completed note is hidden by the
  default "recent-incomplete" filter, appears under the "Completed" filter, and
  disappears again when switching back to "recent". Exercises NoteFilters chips.
covers: [F-TAO-1]
tags: [notes, tao, p2]
modes: [browser]
fixtures: [reset_db]
timeout_sec: 45
steps:
  - open: ${cfg.app.base_url}
  - wait_for: '[data-testid="status-bar"]'
  - wait_for: '[data-testid="ai-chat-drawer-ribbon"]'
  - click: '[data-testid="ai-chat-drawer-ribbon"]'
  - wait_for: '[data-testid="ai-chat-drawer"]'
  - click: '[data-testid="tao-hub-tab-notes"]'
  - wait_for: '[data-testid="notes-panel"]'
  - click: '[data-testid="notes-new"]'
  - wait_for: '[data-testid="note-editor"]'
  - fill: { selector: '[data-testid="note-editor-title"]', value: "QA finish me" }
  - click: '[data-testid="note-editor-back"]'
  - wait_for: '[data-testid="notes-panel"]'
  - assert_text: { selector: '[data-testid="notes-list"]', contains: "QA finish me" }
  - click: '[data-testid="notes-toggle-complete"]'
  - wait: 0.5
  - assert_not_visible: '[data-testid="notes-list"] >> text="QA finish me"'
  # The Completed filter reveals it again.
  - click: '[data-testid="notes-filter-completed"]'
  - wait: 0.5
  - assert_text: { selector: '[data-testid="notes-list"]', contains: "QA finish me" }
  # Back to recent-incomplete hides it once more.
  - click: '[data-testid="notes-filter-recent_incomplete"]'
  - wait: 0.5
  - assert_not_visible: '[data-testid="notes-list"] >> text="QA finish me"'
  - screenshot: notes-003-filter-recent-incomplete.png
