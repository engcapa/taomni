id: TC-AI-003
title: Web Search panel exposes native vs client provider matrix
description: |
  F-AI-2.5 ProviderCaps + WebSearchPanel UI surface: the settings panel must let
  the user pick from at least 6 search providers (SearXNG / Tavily / Serper
  / Brave / Exa / Google CSE) and offer the four-tier confirmation modes
  (per_call / per_thread / always / disabled). Smoke check only — no actual
  network calls.
covers: [F-AI-2.5]
tags: [ai, web-search, p1]
modes: [browser]
fixtures: [reset_db]
timeout_sec: 45
steps:
  - open: ${cfg.app.base_url}
  - wait_for: '[data-testid="ribbon-settings"]'
  - click: '[data-testid="ribbon-settings"]'
  - wait_for: 'text=Web Search'
  - assert_visible: 'text="Web Search"'
  - assert_visible: 'text="SearXNG"'
  - assert_visible: 'text="Tavily"'
  - assert_visible: 'text="Serper"'
  - assert_visible: 'text="Brave Search"'
  - assert_visible: 'text="Exa"'
  - assert_visible: 'text="Google CSE"'
  # Confirmation modes (when enabled). English defaults from i18n
  # locale "en"; zh-CN substitutes 每次确认 / 本 thread 静默 / etc.
  - assert_visible: 'text="Confirm every time (default)"'
  - assert_visible: 'text="Confirm once per thread"'
  - assert_visible: 'text="Always allow"'
  - assert_visible: 'text="Disabled"'
  - screenshot: ai-003-web-search.png
