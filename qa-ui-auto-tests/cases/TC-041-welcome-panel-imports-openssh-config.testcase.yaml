id: TC-041
title: Sessions menu exposes OpenSSH config import
covers: [F6.6]
tags: [import, legacy-imported, p1, welcome]
modes: [browser]
fixtures: [reset_db]
steps:
  - open: "${cfg.app.base_url}"
  - wait_for: "[data-testid=\"welcome-panel\"]"
  - assert_not_visible: "text=\"Import OpenSSH config\""
  - click: '[data-testid="menu-sessions"]'
  - assert_visible: '[data-testid="menu-import-sessions"]'
  - wait: 1
  - screenshot: 041-import-openssh-config.png
