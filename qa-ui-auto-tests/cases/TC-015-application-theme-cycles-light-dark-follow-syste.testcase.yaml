id: TC-015
title: Application theme cycles Light → Dark → Follow system and persists
covers: [F5.5]
tags: [legacy-imported, p0, persistence, settings, theme]
modes: [browser, native]
fixtures: [reset_db]
steps:
  - open: "${cfg.app.base_url}"
  - wait_for: "[data-testid=\"status-bar\"]"
  - reload: null
  - wait_for: "[data-testid=\"status-bar\"]"
  - assert_text: {selector: "[data-testid=\"status-bar\"]", contains: "Theme:"}
  - click: "button[aria-label=\"Cycle application theme\"]"
  - wait: 1
  - eval_readonly:
      expression: 'document.documentElement.getAttribute("data-app-theme")'
  - click: "button[aria-label=\"Cycle application theme\"]"
  - wait: 1
  - click: "button[aria-label=\"Cycle application theme\"]"
  - wait: 1
  - assert_localstorage: {key: "taomni.appTheme.v1", exists: true}
  - reload: null
  - wait_for: "[data-testid=\"status-bar\"]"
  - eval_readonly:
      expression: 'document.documentElement.getAttribute("data-app-theme")'
  - screenshot: 015-app-theme-cycle.png
