id: TC-021
title: Terminal theme preview picker hot-swaps without reconnecting
covers: [F5.2]
tags: [appearance, legacy-imported, p1, terminal, theme]
modes: [browser]
fixtures: [reset_db]
steps:
  - open: "${cfg.app.base_url}"
  - click: "[data-testid=\"welcome-open-local-terminal\"]"
  - wait_for: "[data-testid=\"terminal-pane\"]"
  - click: "[data-testid=\"terminal-pane\"]"
  - type: echo qa-theme-marker
  - press: Enter
  - wait: 1
  - right_click: { selector: "[data-testid=\"terminal-pane\"]", position: { x: 24, y: 24 } }
  - wait_for: "[data-testid=\"context-menu\"]"
  - hover: "text=Theme"
  - wait: 1
  - assert_count: { selector: '[data-testid^="terminal-context-theme-option-"]', min: 3 }
  - click: '[data-testid="terminal-context-theme-option-termius-dark"]'
  - wait: 1
  - assert_text: {selector: "[data-testid=\"terminal-pane\"]", contains: qa-theme-marker}
  - click: "[data-testid=\"terminal-pane\"]"
  - type: echo qa-theme-still-alive
  - press: Enter
  - wait: 1
  - assert_text: {selector: "[data-testid=\"terminal-pane\"]", contains: qa-theme-still-alive}
  - screenshot: 021-terminal-theme-hot-swap.png
