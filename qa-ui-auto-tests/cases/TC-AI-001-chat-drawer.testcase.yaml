id: TC-AI-001
title: AI Chat Drawer opens, lists threads, and shows attachment chips
description: |
  Verifies the AI Chat Drawer surface (F-AI-2.4): the title-bar AI button is
  mounted (and hidden when AI is fully disabled), Ctrl+L opens the global
  drawer, the header exposes the New / History / Close buttons, the composer
  placeholder advertises the @reference syntax, typing `@terminal:last-30`
  raises an attachment chip, and Ctrl+L toggles the drawer closed again.
  Does not exercise streaming or send (those need a real LLM key);
  the assertion target is UI plumbing only.
covers: [F-AI-2.4]
tags: [ai, drawer, p1]
modes: [browser]
fixtures: [reset_db]
timeout_sec: 45
steps:
  - open: ${cfg.app.base_url}
  - wait_for: '[data-testid="status-bar"]'
  # PTT button mounted in title bar
  - assert_visible: '[data-testid="ptt-button"]'
  # AI Chat tray button is present (AI mode is not "fully_disabled" by default)
  - assert_visible: '[data-testid="ai-chat-drawer-toggle"]'
  # Open drawer via Ctrl+L
  - press: 'Control+l'
  - wait_for: '[data-testid="ai-chat-drawer"]'
  # Drawer header shows New / History / Close buttons
  - assert_visible: 'button[title="新对话"]'
  - assert_visible: 'button[title="历史对话"]'
  - assert_visible: '[data-testid="ai-chat-drawer"] button[title^="关闭"]'
  # Composer placeholder advertises @reference syntax
  - assert_attribute:
      selector: '[data-testid="ai-chat-drawer"] textarea'
      name: placeholder
      equals: '输入消息... (Ctrl+Enter 发送 · 支持 @terminal:last-50 / @file:./error.log)'
  # Type a message with an attachment ref → chip should appear
  - fill:
      selector: '[data-testid="ai-chat-drawer"] textarea'
      value: 'show me what failed @terminal:last-30'
  - wait_for: '[data-testid="attachment-chip"]'
  - assert_visible: '[data-testid="attachment-chip"]'
  - screenshot: ai-001-drawer.png
  # Closing via Ctrl+L should hide drawer
  - press: 'Control+l'
  - assert_not_visible: '[data-testid="ai-chat-drawer"]'
