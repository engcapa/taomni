id: TC-AI-001
title: AI Chat Drawer opens, lists threads, and shows attachment chips
description: |
  Verifies the AI Chat Drawer surface (F-AI-2.4): Welcome exposes Chat Tao,
  opening it creates a tab-bound drawer, the header exposes New / History /
  position / pin / hide controls, the composer exposes attach and resize controls,
  top/bottom floating mode exposes the drawer opacity slider,
  the composer placeholder advertises the
  @reference syntax, typing `@terminal:last-30` raises an attachment chip,
  and hiding the drawer leaves a Tao ribbon that can reopen it.
  Does not exercise streaming or send (those need a real LLM key);
  the assertion target is UI plumbing only.
covers: [F-AI-2.4]
tags: [ai, drawer, p1]
modes: [browser]
fixtures: [reset_db]
timeout_sec: 45
steps:
  - open: ${cfg.app.base_url}
  - wait_for: '[data-testid="status-bar"]'
  # PTT button mounted in title bar
  - assert_visible: '[data-testid="ptt-button"]'
  - assert_visible: '[data-testid="welcome-open-chat-tao"]'
  - click: '[data-testid="welcome-open-chat-tao"]'
  - wait_for: '[data-testid="ai-chat-drawer"]'
  # Drawer header shows New / History / layout / hide buttons (English defaults
  # — locale switcher can change them, see F-i18n-1).
  - assert_visible: 'button[title="New chat"]'
  - assert_visible: 'button[title="History"]'
  - assert_visible: '[data-testid="ai-chat-drawer-position"]'
  - assert_visible: '[data-testid="ai-chat-drawer-pin"]'
  - assert_visible: '[data-testid="ai-chat-drawer-hide"]'
  # Move to top floating mode; opacity controls only exist for top/bottom floating drawers.
  - click: '[data-testid="ai-chat-drawer-position"]'
  - click: 'text=Top'
  - wait_for: '[data-testid="ai-chat-drawer-opacity"]'
  - click: '[data-testid="ai-chat-drawer-opacity"]'
  - wait_for: '[data-testid="ai-chat-drawer-opacity-slider"]'
  - click: '[data-testid="ai-chat-drawer-opacity-slider"]'
  - assert_visible: '[data-testid="ai-chat-composer"]'
  - assert_visible: '[data-testid="ai-chat-attach-button"]'
  - assert_visible: '[data-testid="ai-chat-composer-resize"]'
  # Composer placeholder advertises @reference syntax
  - assert_attribute:
      selector: '[data-testid="ai-chat-drawer"] textarea'
      name: placeholder
      equals: 'Type a message... (Ctrl+Enter to send · supports @terminal:last-50 / @file:./error.log)'
  # Type a message with an attachment ref → chip should appear
  - fill:
      selector: '[data-testid="ai-chat-drawer"] textarea'
      value: 'show me what failed @terminal:last-30'
  - wait_for: '[data-testid="attachment-chip"]'
  - assert_visible: '[data-testid="attachment-chip"]'
  - screenshot: ai-001-drawer.png
  # Hiding should collapse to the current edge ribbon.
  - click: '[data-testid="ai-chat-drawer-hide"]'
  - assert_not_visible: '[data-testid="ai-chat-drawer"]'
  - wait_for: '[data-testid="ai-chat-drawer-ribbon"]'
  - click: '[data-testid="ai-chat-drawer-ribbon"]'
  - wait_for: '[data-testid="ai-chat-drawer"]'
