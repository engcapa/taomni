id: TC-002
title: Global settings persist terminal appearance controls
covers: [F11.1, F5.1, F5.2]
tags: [appearance, legacy-imported, p0, settings, smoke]
modes: [browser, native]
fixtures: [reset_db]
steps:
  - open: "${cfg.app.base_url}"
  - click: "[data-testid=\"ribbon-settings\"]"
  - wait_for: "[data-testid=\"settings-panel\"]"
  - assert_visible: "text=\"Application Theme\""
  - assert_visible: "text=\"Terminal Appearance\""
  - assert_visible: "[data-testid=\"terminal-appearance-settings\"]"
  - assert_visible: "[data-testid=\"terminal-theme-gallery\"]"
  - assert_visible: "[data-testid=\"terminal-preview\"]"
  - assert_visible: "[data-testid=\"terminal-preview-cursor\"]"
  - click: "button[aria-label=\"Cycle application theme\"]"
  - select_option: {selector: "select[aria-label=\"Terminal font\"]", label: Source Code Pro}
  - select_option: {selector: "select[aria-label=\"Terminal cursor\"]", label: Underline (steady)}
  - fill: {selector: "input[aria-label=\"Terminal font size\"]", value: "16"}
  - click: "button[aria-label=\"Decrease text size\"]"
  - click: "button[aria-label=\"Increase text size\"]"
  - fill: {selector: "input[aria-label=\"Scrollback lines\"]", value: "5000"}
  - fill: {selector: "input[aria-label=\"Maximum command history entries per host\"]", value: "250"}
  - select_option: {selector: "select[aria-label=\"Right click behavior\"]", label: Show context menu}
  - fill: {selector: "input[aria-label=\"Terminal background hex\"]", value: "#101820"}
  - fill: {selector: "input[aria-label=\"Terminal foreground hex\"]", value: "#f2f2f2"}
  - assert_visible: "[data-testid=\"terminal-preview\"]"
  # Reset terminal profile back to defaults
  - click: '[data-testid="settings-reset-terminal-profile"]'
  - wait: 0.5
  - assert_visible: "[data-testid=\"terminal-preview\"]"
  - screenshot: 002-settings-appearance.png
