id: TC-auto-F-DB-1-sql-session-scaffold
title: SQL DB session form mounts and saved MySQL session round-trips
description: |
  Coverage smoke for F-DB-1 (SQL client: MySQL / PostgreSQL / ClickHouse).
  Opens SessionEditor, switches to the MySQL protocol — which auto-jumps to
  the dedicated Database settings tab — asserts the DB settings form mounts
  with its engine-specific fields, fills them, saves the bookmark, and
  reopens it to confirm the proto=MySQL chip round-trips.

  The test does NOT open a live SQL connection: browser preview rejects
  db_connect ("Database connections are not available in browser preview"),
  so the DbClientTab inner surface (schema-tree / sql-editor /
  query-result-grid) only mounts on a real desktop connection. That live
  surface is left to native/manual regression against a configured DB
  fixture (same scaffold-only pattern as TC-111 RDP and TC-112 WSL).
covers: [F-DB-1, F6.3]
tags: [auto-generated, smoke, needs-review, database, sql, scaffolding-only, no-connect]
modes: [browser]
fixtures: [reset_db]
timeout_sec: 45
steps:
  - open: ${cfg.app.base_url}
  - wait_for: '[data-testid="sidebar"]'
  - click: '[data-testid="session-new"]'
  - wait_for: '[data-testid="session-editor"]'
  # Selecting a DB proto auto-switches to the database section.
  - click: '[data-testid="session-proto-mysql"]'
  - wait_for:
      selector: '[data-testid="session-database-section"]'
      timeout_sec: 5
  - assert_visible: '[data-testid="database-settings"]'
  # Connection fields (host/port are shared top-of-form controls owned by F6.3).
  - fill:
      selector: '[data-testid="session-host"]'
      value: db-host.example.test
  - fill:
      selector: '[data-testid="session-port"]'
      value: "3306"
  # Engine-specific DB form fields (aria-label inputs in DatabaseSettings).
  - fill:
      selector: 'input[aria-label="Database username"]'
      value: qa_user
  - fill:
      selector: 'input[aria-label="Database name"]'
      value: qa_db
  # Name the bookmark and save.
  - click: '[data-testid="session-section-bookmark"]'
  - wait_for: '[data-testid="bookmark-settings"]'
  - fill:
      selector: '[data-testid="session-name"]'
      value: qa-ui-auto-mysql
  - click: '[data-testid="session-save"]'
  - wait_for: '[data-testid="session-tree-item"][data-session-name="qa-ui-auto-mysql"]'
  - screenshot: db-1-sql-saved.png
  # Round-trip check — reselect the tree item, reopen the editor, and assert
  # the proto=MySQL chip is active. (Double-clicking would open the live DB
  # tab, which cannot connect in browser preview.)
  - click: '[data-testid="session-tree-item"][data-session-name="qa-ui-auto-mysql"]'
  - click: '[data-testid="session-edit"]'
  - wait_for: '[data-testid="session-editor"]'
  - wait_for:
      selector: '[data-testid="session-proto-mysql"][data-active="true"]'
      timeout_sec: 5
  - assert_visible: '[data-testid="database-settings"]'
