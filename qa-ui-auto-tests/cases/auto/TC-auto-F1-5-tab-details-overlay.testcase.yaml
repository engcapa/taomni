id: TC-auto-F1-5-tab-details-overlay
title: Visible tab details overlay and active detach menu
description: |
  Exercises the title-bar details shortcut introduced for F1.5. A local
  terminal supplies a second visible tab; hovering the stacked-tabs info
  button reveals one detail card per viewport-visible tab. The case then
  verifies that Detach is discoverable from the Open Tabs menu instead of the
  active tab action slot.
covers: [F1.5]
tags: [auto-generated, smoke, needs-review, tabs, terminal]
modes: [browser]
fixtures: [reset_db]
timeout_sec: 25
steps:
  - open: ${cfg.app.base_url}
  - wait_for: '[data-testid="tab-bar"]'
  - click: '[data-testid="new-local-terminal"]'
  - wait_for: '[data-testid="terminal-pane"]'
  - assert_count: {selector: '[data-testid="tab-item"]', min: 2}
  - hover: '[data-testid="tab-details-hover"]'
  - wait_for: '[data-testid="tab-details-overlay"]'
  - assert_count: {selector: '[data-testid^="tab-details-card-"]', min: 2}
  - click: '[data-testid="tab-more"]'
  - wait_for: '[data-testid="open-tabs-menu"]'
  - assert_visible: '[data-testid="open-tabs-detach-active"]'
  - screenshot: f1-5-tab-details-overlay.png
  - click: '[data-testid="open-tabs-detach-active"]'
