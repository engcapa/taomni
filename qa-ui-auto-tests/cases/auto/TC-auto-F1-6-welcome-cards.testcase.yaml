id: TC-auto-F1-6
title: Welcome panel exposes the action cards and tips section
description: |
  Auto-generated focused coverage for F1.6 (WelcomePanel). The panel
  exposes the local-terminal launcher and the "New session…" action, plus
  a static "Tips" section. This case clicks the new-session card and
  verifies the tips block renders.
covers: [F1.6]
tags: [auto-generated, smoke, p1, welcome, needs-review]
modes: [browser]
fixtures: [reset_db]
timeout_sec: 45
steps:
  - open: ${cfg.app.base_url}
  - wait_for: '[data-testid="welcome-panel"]'
  - assert_visible: text="New session…"
  - assert_not_visible: text="Import OpenSSH config"
  - assert_not_visible: text="Refresh sessions"
  - assert_visible: '[data-testid="welcome-open-home-folder"]'
  - assert_visible: text="Tips"

  # New session card opens the SessionEditor; close without saving.
  - click: text="New session…"
  - wait_for: '[data-testid="session-editor"]'
  - press: Escape
  - wait_for:
      selector: '[data-testid="session-editor"]'
      state: detached
      timeout_sec: 5

  - screenshot: F1.6-welcome-cards.png
