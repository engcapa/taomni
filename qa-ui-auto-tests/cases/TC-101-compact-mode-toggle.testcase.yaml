id: TC-101
title: Compact mode toggle persists across reload
description: |
  Smoke test for F1.4 (compact UI mode). Click the compact-toggle, verify
  taomni.compactMode flips in localStorage, that the compact main-menu
  affordance is reachable in compact mode, then reload and confirm the
  mode sticks.
covers: [F1.4]
tags: [smoke, p1, main, window]
modes: [browser]
fixtures: [reset_db]
timeout_sec: 30
steps:
  - open: ${cfg.app.base_url}
  - wait_for: '[data-testid="titlebar-tray"]'
  - assert_localstorage: { key: "taomni.compactMode", exists: false }
  - click: '[data-testid="compact-toggle"]'
  - wait: 0.5
  - assert_localstorage: { key: "taomni.compactMode", exists: true }
  - wait_for: '[data-testid="compact-titlebar"]'
  # Compact main-menu opens the unified context menu and dismisses cleanly
  - click: '[data-testid="compact-main-menu"]'
  - wait_for: '[data-testid="context-menu"]'
  - assert_visible: text="New local terminal"
  - press: Escape
  - wait_for:
      selector: '[data-testid="context-menu"]'
      state: detached
      timeout_sec: 5
  - reload:
  - wait_for: '[data-testid="titlebar-tray"]'
  - assert_localstorage: { key: "taomni.compactMode", exists: true }
  - screenshot: 101-compact-mode.png
