id: TC-018
title: Session editor protocol switch shows protocol-specific shell
covers: [F6.3]
tags: [legacy-imported, p1, protocol, session]
modes: [browser]
fixtures: [reset_db]
steps:
  - open: "${cfg.app.base_url}"
  - click: "[data-testid=\"session-new\"]"
  - wait_for: "[data-testid=\"session-editor\"]"
  - click: "[data-testid=\"session-proto-ssh\"]"
  - assert_visible: "[data-testid=\"advanced-ssh-settings\"]"
  - click: "[data-testid=\"session-proto-sftp\"]"
  - wait: 1
  - assert_visible: "[data-testid=\"session-host\"]"
  - assert_visible: "[data-testid=\"session-user\"]"
  - click: "[data-testid=\"session-proto-rdp\"]"
  - wait: 1
  - assert_visible: "[data-testid=\"session-host\"]"
  - click: "[data-testid=\"session-proto-vnc\"]"
  - wait: 1
  - assert_visible: "[data-testid=\"session-host\"]"
  - click: "[data-testid=\"session-proto-browser\"]"
  - wait: 1
  - assert_visible: "[data-testid=\"session-host\"]"
  - fill:
      selector: "[data-testid=\"session-host\"]"
      value: "https://docs.example.test"
  - click: "[data-testid=\"session-proto-ftp\"]"
  - wait: 1
  - assert_visible: "[data-testid=\"session-host\"]"
  - assert_visible: "[data-testid=\"session-port\"]"
  - click: "[data-testid=\"session-proto-telnet\"]"
  - wait: 1
  - assert_visible: "[data-testid=\"session-host\"]"
  - click: "[data-testid=\"session-proto-rlogin\"]"
  - wait: 1
  - assert_visible: "[data-testid=\"session-host\"]"
  - click: "[data-testid=\"session-proto-mosh\"]"
  - wait: 1
  - assert_visible: "[data-testid=\"session-host\"]"
  - click: "[data-testid=\"session-proto-serial\"]"
  - wait_for: "[data-testid=\"session-serial-section\"]"
  - assert_visible: "[data-testid=\"session-serial-device\"]"
  - assert_visible: "[data-testid=\"session-serial-baud\"]"
  - fill:
      selector: "[data-testid=\"session-serial-device\"]"
      value: "/dev/ttyUSB0"
  - fill:
      selector: "[data-testid=\"session-serial-baud\"]"
      value: "115200"
  - click: "[data-testid=\"session-proto-shell\"]"
  - wait_for: "[data-testid=\"session-local-shell-section\"]"
  - assert_visible: "[data-testid=\"local-shell-preview\"]"
  - assert_not_visible: "[data-testid=\"session-planned-client-note\"]"
  - click: "[data-testid=\"session-proto-ssh\"]"
  - assert_visible: "[data-testid=\"advanced-ssh-settings\"]"
  - screenshot: 018-session-protocol-switch.png
