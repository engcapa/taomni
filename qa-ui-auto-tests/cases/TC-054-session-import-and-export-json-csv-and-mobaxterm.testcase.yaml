id: TC-054
title: Session import and export JSON, CSV, and MobaXterm formats
covers: [F6.6]
tags: [export, import, legacy-imported, p1, session]
modes: [browser]
fixtures: [reset_db, ssh_required]
steps:
  - open: "${cfg.app.base_url}"
  - click: "[data-testid=\"session-new\"]"
  - wait_for: "[data-testid=\"session-editor\"]"
  - fill: {selector: "[data-testid=\"session-host\"]", value: "${cfg.ssh.host}"}
  - fill: {selector: "[data-testid=\"session-port\"]", value: "${cfg.ssh.port}"}
  - fill: {selector: "[data-testid=\"session-user\"]", value: "${cfg.ssh.user}"}
  - click: "[data-testid=\"session-section-bookmark\"]"
  - wait_for: "[data-testid=\"bookmark-settings\"]"
  - fill: {selector: "[data-testid=\"session-name\"]", value: qa-ui-auto-export-source}
  - click: "[data-testid=\"session-save\"]"
  - wait_for: "[data-testid=\"session-tree-item\"][data-session-name=\"qa-ui-auto-export-source\"]"
  - seed_dialog: {confirm: true}
  - right_click: { selector: "[data-testid=\"session-tree\"]", position: { x: 16, y: 16 } }
  - wait_for: "[data-testid=\"context-menu\"]"
  - assert_visible: '[data-testid="context-menu"] >> text=/Export Taomni session/i'
  - press: Escape
  - right_click: { selector: "[data-testid=\"session-tree\"]", position: { x: 16, y: 16 } }
  - wait_for: "[data-testid=\"context-menu\"]"
  - assert_visible: '[data-testid="context-menu"] >> text=/Export MobaXterm session/i'
  - press: Escape
  - screenshot: 054-session-import-export.png
