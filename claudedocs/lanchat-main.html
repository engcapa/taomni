<!doctype html>
<html lang="zh" data-app-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Taomni · 内网通讯 — 交互原型</title>
<style>
:root{
  --taomni-bg:#f8fafc;--taomni-chrome-bg:#f1f5f9;--taomni-chrome-border:#cbd5e1;
  --taomni-titlebar-from:#e2e8f0;--taomni-titlebar-to:#cbd5e1;--taomni-menubar-bg:#f8fafc;
  --taomni-accent:#1e40af;--taomni-accent-soft:#3b82f6;--taomni-tab-active:#ffffff;
  --taomni-tab-inactive:#e2e8f0;--taomni-tab-border:#cbd5e1;--taomni-sidebar-bg:#f8fafc;
  --taomni-sidebar-border:#e2e8f0;--taomni-panel-bg:#f8fafc;--taomni-card-bg:#ffffff;
  --taomni-card-border:#e2e8f0;--taomni-status-bg:#f1f5f9;--taomni-status-text:#1e293b;
  --taomni-text:#0f172a;--taomni-text-muted:#64748b;--taomni-divider:#e2e8f0;
  --taomni-hover:#f1f5f9;--taomni-selected:#dbeafe;--taomni-selected-border:#93c5fd;
  --taomni-input-bg:#ffffff;--taomni-input-border:#cbd5e1;--taomni-link:#2563eb;
  --taomni-button-from:#ffffff;--taomni-button-to:#f1f5f9;
  --taomni-shadow-sm:0 1px 2px rgba(15,23,42,.05);
  --taomni-shadow-md:0 4px 16px -2px rgba(15,23,42,.06),0 2px 4px -1px rgba(15,23,42,.02);
  --taomni-shadow-lg:0 16px 24px -4px rgba(15,23,42,.12),0 4px 8px -2px rgba(15,23,42,.06);
  --taomni-transition:all .22s cubic-bezier(.4,0,.2,1);
  --ui-font:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",sans-serif;
  --ok:#16a34a;--warn:#f59e0b;--busy:#ef4444;--away:#f59e0b;
}
[data-app-theme="dark"]{
  --taomni-bg:#0b0f19;--taomni-chrome-bg:#0f172a;--taomni-chrome-border:#1e293b;
  --taomni-titlebar-from:#1e293b;--taomni-titlebar-to:#0f172a;--taomni-menubar-bg:#0b0f19;
  --taomni-accent:#60a5fa;--taomni-accent-soft:#93c5fd;--taomni-tab-active:#0b0f19;
  --taomni-tab-inactive:#1e293b;--taomni-tab-border:#334155;--taomni-sidebar-bg:#0b0f19;
  --taomni-sidebar-border:#1e293b;--taomni-panel-bg:#0f172a;--taomni-card-bg:#1e293b;
  --taomni-card-border:#334155;--taomni-status-bg:#0b0f19;--taomni-status-text:#cbd5e1;
  --taomni-text:#f8fafc;--taomni-text-muted:#94a3b8;--taomni-divider:#1e293b;
  --taomni-hover:#1e293b;--taomni-selected:#1e3a8a;--taomni-selected-border:#3b82f6;
  --taomni-input-bg:#0b0f19;--taomni-input-border:#334155;--taomni-link:#60a5fa;
  --taomni-button-from:#1e293b;--taomni-button-to:#0f172a;
  --taomni-shadow-lg:0 16px 24px -4px rgba(0,0,0,.5),0 4px 8px -2px rgba(0,0,0,.25);
}
*{box-sizing:border-box}
html,body{height:100%}
body{margin:0;font-family:var(--ui-font);font-size:12px;color:var(--taomni-text);
  background:var(--taomni-chrome-bg);overflow:hidden}
.app{display:flex;flex-direction:column;height:100vh}
/* titlebar */
.titlebar{display:flex;align-items:center;height:34px;flex:0 0 34px;
  background:linear-gradient(to bottom,var(--taomni-titlebar-from),var(--taomni-titlebar-to));
  border-bottom:1px solid var(--taomni-chrome-border);user-select:none;-webkit-user-select:none}
.brand{display:flex;align-items:center;gap:7px;padding:0 12px;font-weight:600}
.brand .logo{width:16px;height:16px;border-radius:4px;
  background:linear-gradient(135deg,var(--taomni-accent-soft),var(--taomni-accent))}
.menus{display:flex;gap:2px}
.menus button{border:none;background:transparent;color:var(--taomni-text);padding:4px 9px;
  border-radius:4px;cursor:pointer;font-size:12px}
.menus button:hover{background:rgba(127,127,127,.14)}
.tray{margin-left:auto;display:flex;align-items:center;gap:2px;padding:0 6px}
.tray .ic{width:26px;height:24px;display:grid;place-items:center;border-radius:4px;cursor:pointer;
  color:var(--taomni-text-muted)}
.tray .ic:hover{background:rgba(127,127,127,.14);color:var(--taomni-text)}
.wctrl{display:flex;border-left:1px solid color-mix(in srgb,var(--taomni-divider) 80%,transparent)}
.wctrl button{width:40px;height:34px;border:none;background:transparent;color:var(--taomni-text-muted);cursor:pointer}
.wctrl button:hover{background:rgba(127,127,127,.16)}
.wctrl button.close:hover{background:#c42b1c;color:#fff}
/* tabbar */
.tabbar{display:flex;align-items:flex-end;gap:0;height:30px;flex:0 0 30px;padding:5px 8px 0;
  background:var(--taomni-chrome-bg);border-bottom:1px solid var(--taomni-tab-border)}
.tab{display:inline-flex;align-items:center;gap:6px;height:25px;padding:0 12px;font-size:12px;
  border:1px solid var(--taomni-tab-border);border-bottom:none;background:var(--taomni-tab-inactive);
  color:var(--taomni-text);border-radius:5px 5px 0 0;margin-right:-1px;cursor:pointer}
.tab[data-active="true"]{background:var(--taomni-tab-active);font-weight:600;
  box-shadow:0 -2px 0 0 var(--taomni-accent) inset}
.tab .dot{width:7px;height:7px;border-radius:50%}
/* body grid */
.body{flex:1;display:flex;min-height:0;background:var(--taomni-bg)}
.sidebar{width:46px;flex:0 0 46px;border-right:1px solid var(--taomni-sidebar-border);
  background:var(--taomni-sidebar-bg);display:flex;flex-direction:column;align-items:center;padding-top:8px;gap:4px}
.sidebar .nav{width:34px;height:34px;display:grid;place-items:center;border-radius:7px;cursor:pointer;
  color:var(--taomni-text-muted);position:relative}
.sidebar .nav:hover{background:var(--taomni-hover)}
.sidebar .nav[data-active="true"]{background:var(--taomni-selected);color:var(--taomni-accent)}
.sidebar .nav .badge{position:absolute;top:2px;right:2px;min-width:14px;height:14px;border-radius:7px;
  background:var(--busy);color:#fff;font-size:9px;display:grid;place-items:center;padding:0 3px}
/* lan chat layout */
.lan{flex:1;display:flex;min-width:0}
.roster{width:236px;flex:0 0 236px;border-right:1px solid var(--taomni-divider);
  background:var(--taomni-panel-bg);display:flex;flex-direction:column;min-height:0}
.me{padding:10px;border-bottom:1px solid var(--taomni-divider);display:flex;gap:9px;align-items:center}
.avatar{width:38px;height:38px;border-radius:10px;flex:0 0 38px;display:grid;place-items:center;
  color:#fff;font-weight:600;font-size:14px;position:relative}
.avatar .pres{position:absolute;right:-2px;bottom:-2px;width:11px;height:11px;border-radius:50%;
  border:2px solid var(--taomni-panel-bg)}
.me .info{min-width:0}
.me .nm{font-weight:600;font-size:13px}
.me .sig{color:var(--taomni-text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.seg{display:flex;margin:8px;background:var(--taomni-tab-inactive);border-radius:7px;padding:2px}
.seg button{flex:1;border:none;background:transparent;color:var(--taomni-text-muted);padding:5px;
  border-radius:5px;cursor:pointer;font-size:12px}
.seg button[data-active="true"]{background:var(--taomni-card-bg);color:var(--taomni-text);font-weight:600;
  box-shadow:var(--taomni-shadow-sm)}
.search{margin:0 8px 8px}
.search input{width:100%;height:26px;border:1px solid var(--taomni-input-border);background:var(--taomni-input-bg);
  color:var(--taomni-text);border-radius:6px;padding:0 9px;outline:none}
.search input:focus{border-color:var(--taomni-accent)}
.list{flex:1;overflow-y:auto;padding:0 6px 8px}
.grp-label{padding:8px 6px 4px;color:var(--taomni-text-muted);font-size:11px;letter-spacing:.03em}
.item{display:flex;gap:9px;align-items:center;padding:7px 8px;border-radius:8px;cursor:pointer;margin-bottom:1px}
.item:hover{background:var(--taomni-hover)}
.item[data-active="true"]{background:var(--taomni-selected);outline:1px solid var(--taomni-selected-border)}
.item .av{width:32px;height:32px;border-radius:9px;flex:0 0 32px;display:grid;place-items:center;color:#fff;
  font-weight:600;position:relative}
.item .av .pres{position:absolute;right:-2px;bottom:-2px;width:10px;height:10px;border-radius:50%;
  border:2px solid var(--taomni-panel-bg)}
.item .mid{flex:1;min-width:0}
.item .mid .top{display:flex;justify-content:space-between;gap:6px}
.item .mid .nm{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item .mid .tm{color:var(--taomni-text-muted);font-size:11px;flex:0 0 auto}
.item .mid .pre{color:var(--taomni-text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.unread{min-width:16px;height:16px;border-radius:8px;background:var(--busy);color:#fff;font-size:10px;
  display:grid;place-items:center;padding:0 4px}
/* conversation */
.conv{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--taomni-bg)}
.cv-head{display:flex;align-items:center;gap:10px;padding:9px 12px;border-bottom:1px solid var(--taomni-divider);
  background:var(--taomni-panel-bg)}
.cv-head .nm{font-weight:600;font-size:13px}
.cv-head .st{color:var(--taomni-text-muted);font-size:11px}
.cv-actions{margin-left:auto;display:flex;gap:2px}
.cv-actions button{border:1px solid transparent;background:transparent;color:var(--taomni-text-muted);
  width:30px;height:28px;border-radius:6px;cursor:pointer;display:grid;place-items:center}
.cv-actions button:hover{background:var(--taomni-hover);color:var(--taomni-text);border-color:var(--taomni-tab-border)}
.cv-actions button.accent:hover{color:var(--taomni-accent)}
.thread{flex:1;overflow-y:auto;padding:16px 18px;display:flex;flex-direction:column;gap:12px}
.daysep{align-self:center;color:var(--taomni-text-muted);font-size:11px;background:var(--taomni-hover);
  padding:2px 10px;border-radius:10px}
.msg{display:flex;gap:9px;max-width:78%}
.msg .av{width:30px;height:30px;border-radius:8px;flex:0 0 30px;display:grid;place-items:center;color:#fff;font-weight:600}
.msg .bubble{padding:8px 11px;border-radius:10px;background:var(--taomni-card-bg);
  border:1px solid var(--taomni-card-border);box-shadow:var(--taomni-shadow-sm);line-height:1.5}
.msg .who{font-size:11px;color:var(--taomni-text-muted);margin-bottom:3px}
.msg.me{align-self:flex-end;flex-direction:row-reverse}
.msg.me .bubble{background:linear-gradient(135deg,var(--taomni-accent-soft),var(--taomni-accent));color:#fff;border-color:transparent}
.mention{color:var(--taomni-accent);background:color-mix(in srgb,var(--taomni-accent) 14%,transparent);
  padding:0 3px;border-radius:4px;font-weight:600}
.msg.me .mention{color:#fff;background:rgba(255,255,255,.22)}
/* file card */
.filecard{display:flex;gap:10px;align-items:center;min-width:240px}
.filecard .fi{width:34px;height:34px;border-radius:8px;background:color-mix(in srgb,var(--taomni-accent) 16%,transparent);
  display:grid;place-items:center;color:var(--taomni-accent);flex:0 0 34px}
.filecard .meta{flex:1;min-width:0}
.filecard .fn{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.filecard .fsz{color:var(--taomni-text-muted);font-size:11px}
.progress{height:5px;border-radius:3px;background:var(--taomni-divider);overflow:hidden;margin-top:5px}
.progress > i{display:block;height:100%;width:62%;border-radius:3px;
  background:linear-gradient(90deg,var(--taomni-accent-soft),var(--taomni-accent))}
.imgmsg{width:200px;height:120px;border-radius:8px;background:
  linear-gradient(135deg,#0ea5e9,#6366f1);display:grid;place-items:center;color:#fff;font-size:11px}
/* composer */
.composer{border-top:1px solid var(--taomni-divider);background:var(--taomni-panel-bg);padding:8px 10px}
.composer .tools{display:flex;gap:2px;margin-bottom:6px}
.composer .tools button{border:none;background:transparent;color:var(--taomni-text-muted);
  width:28px;height:26px;border-radius:6px;cursor:pointer;display:grid;place-items:center}
.composer .tools button:hover{background:var(--taomni-hover);color:var(--taomni-text)}
.composer .row{display:flex;gap:8px;align-items:flex-end}
.composer textarea{flex:1;resize:none;height:38px;border:1px solid var(--taomni-input-border);
  background:var(--taomni-input-bg);color:var(--taomni-text);border-radius:8px;padding:9px 11px;outline:none;
  font-family:inherit;font-size:12px}
.composer textarea:focus{border-color:var(--taomni-accent)}
.btn{display:inline-flex;align-items:center;gap:6px;height:36px;padding:0 16px;border-radius:8px;cursor:pointer;
  border:1px solid var(--taomni-input-border);background:linear-gradient(to bottom,var(--taomni-button-from),var(--taomni-button-to));
  color:var(--taomni-text);font-size:12px}
.btn.primary{background:linear-gradient(to bottom,var(--taomni-accent-soft),var(--taomni-accent));
  border-color:var(--taomni-accent);color:#fff;font-weight:600}
/* statusbar */
.statusbar{display:flex;align-items:center;gap:14px;height:24px;flex:0 0 24px;padding:0 12px;
  background:var(--taomni-status-bg);border-top:1px solid var(--taomni-divider);
  color:var(--taomni-status-text);font-size:11px}
.statusbar .sp{margin-left:auto}
.live{display:inline-flex;align-items:center;gap:5px}
.live i{width:7px;height:7px;border-radius:50%;background:var(--ok);box-shadow:0 0 0 0 rgba(22,163,74,.5);
  animation:pulse 2s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(22,163,74,.5)}70%{box-shadow:0 0 0 6px rgba(22,163,74,0)}100%{box-shadow:0 0 0 0 rgba(22,163,74,0)}}
/* floating detached window */
.float{position:fixed;width:360px;height:440px;background:var(--taomni-panel-bg);
  border:1px solid var(--taomni-chrome-border);border-radius:12px;box-shadow:var(--taomni-shadow-lg);
  display:flex;flex-direction:column;overflow:hidden;z-index:60}
.float .fhead{display:flex;align-items:center;gap:8px;padding:8px 10px;cursor:move;
  background:linear-gradient(to bottom,var(--taomni-titlebar-from),var(--taomni-titlebar-to));
  border-bottom:1px solid var(--taomni-chrome-border)}
.float .fhead .nm{font-weight:600}
.float .fhead .x{margin-left:auto;width:24px;height:24px;border:none;background:transparent;
  border-radius:6px;cursor:pointer;color:var(--taomni-text-muted)}
.float .fhead .x:hover{background:#c42b1c;color:#fff}
.float .fbody{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px}
/* QQ edge drawer */
.edge-drawer{position:fixed;background:var(--taomni-panel-bg);box-shadow:var(--taomni-shadow-lg);
  z-index:70;display:flex;flex-direction:column;transition:transform .28s cubic-bezier(.4,0,.2,1)}
.edge-drawer .dhead{display:flex;align-items:center;gap:8px;padding:9px 12px;
  background:linear-gradient(to bottom,var(--taomni-titlebar-from),var(--taomni-titlebar-to));
  border-bottom:1px solid var(--taomni-chrome-border);font-weight:600;cursor:default}
.edge-drawer .dhead .x{margin-left:auto;border:none;background:transparent;color:var(--taomni-text-muted);
  width:24px;height:24px;border-radius:6px;cursor:pointer}
.edge-drawer .dhead .x:hover{background:#c42b1c;color:#fff}
.edge-drawer .dbody{flex:1;overflow:auto;padding:12px;display:flex;flex-direction:column;gap:10px}
.peek{position:fixed;z-index:71;background:linear-gradient(135deg,var(--taomni-accent-soft),var(--taomni-accent));
  color:#fff;font-weight:600;cursor:pointer;box-shadow:var(--taomni-shadow-md);display:flex;align-items:center;
  justify-content:center;gap:6px;user-select:none}
/* dropdown */
.pop{position:fixed;z-index:90;background:var(--taomni-card-bg);border:1px solid var(--taomni-card-border);
  border-radius:8px;box-shadow:var(--taomni-shadow-lg);padding:5px;min-width:150px}
.pop button{display:flex;align-items:center;gap:8px;width:100%;border:none;background:transparent;
  color:var(--taomni-text);padding:7px 10px;border-radius:6px;cursor:pointer;text-align:left;font-size:12px}
.pop button:hover{background:var(--taomni-hover)}
.hint{position:fixed;left:50%;top:14px;transform:translateX(-50%);z-index:120;
  background:var(--taomni-text);color:var(--taomni-bg);padding:8px 14px;border-radius:8px;
  box-shadow:var(--taomni-shadow-lg);opacity:0;transition:opacity .25s;pointer-events:none;font-size:12px}
.hint.show{opacity:.96}
.banner{display:flex;align-items:center;gap:8px;margin:8px 12px 0;padding:7px 11px;border-radius:8px;
  background:color-mix(in srgb,var(--warn) 16%,transparent);border:1px solid var(--warn);
  color:var(--taomni-text);font-size:11px}
svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.list::-webkit-scrollbar,.thread::-webkit-scrollbar,.fbody::-webkit-scrollbar{width:10px}
.list::-webkit-scrollbar-thumb,.thread::-webkit-scrollbar-thumb,.fbody::-webkit-scrollbar-thumb{
  background:var(--taomni-tab-border);border-radius:5px;border:2px solid transparent;background-clip:padding-box}
</style>
</head>
<body>
<div class="app">
  <!-- titlebar -->
  <div class="titlebar">
    <div class="brand"><span class="logo"></span>Taomni</div>
    <div class="menus">
      <button>文件</button><button>会话</button><button>查看</button>
      <button>工具</button><button>帮助</button>
    </div>
    <div class="tray">
      <div class="ic" id="themeBtn" title="切换明暗主题">
        <svg viewBox="0 0 24 24"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
      </div>
      <div class="ic" title="设置"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.6 1.6 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.6 1.6 0 0 0-2.7 1.1V21a2 2 0 0 1-4 0v-.1A1.6 1.6 0 0 0 7 19.4a1.6 1.6 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1A1.6 1.6 0 0 0 2.6 9 1.6 1.6 0 0 0 1 7.3V7a2 2 0 0 1 4 0"/></svg></div>
      <div class="wctrl">
        <button>—</button><button>▢</button><button class="close">✕</button>
      </div>
    </div>
  </div>
  <!-- tabbar -->
  <div class="tabbar">
    <div class="tab"><span class="dot" style="background:var(--ok)"></span>web01 · SSH</div>
    <div class="tab">SFTP · web01</div>
    <div class="tab" data-active="true">
      <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      内网通讯
    </div>
  </div>
  <!-- body -->
  <div class="body">
    <div class="sidebar">
      <div class="nav" title="会话"><svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h10"/></svg></div>
      <div class="nav" data-active="true" title="内网通讯">
        <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        <span class="badge">3</span>
      </div>
      <div class="nav" title="文件传输"><svg viewBox="0 0 24 24"><path d="M12 3v12m0 0l-4-4m4 4l4-4M4 21h16"/></svg></div>
      <div class="nav" title="会议"><svg viewBox="0 0 24 24"><path d="M15 10l5-3v10l-5-3v2a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2z"/></svg></div>
      <div class="nav" title="白板"><svg viewBox="0 0 24 24"><path d="M3 4h18v12H3zM8 20h8M12 16v4"/></svg></div>
    </div>

    <div class="lan">
      <!-- roster -->
      <div class="roster">
        <div class="me">
          <div class="avatar" style="background:linear-gradient(135deg,#6366f1,#1e40af)">我
            <span class="pres" style="background:var(--ok)" id="myPres"></span>
          </div>
          <div class="info">
            <div class="nm">林开发 <span style="color:var(--taomni-text-muted);font-weight:400">· 本机</span></div>
            <div class="sig" id="mySig" title="点击修改状态签名">摸鱼中，勿扰 ✨</div>
          </div>
        </div>
        <div class="seg">
          <button data-active="true" onclick="switchSeg(this,'members')">成员 8</button>
          <button onclick="switchSeg(this,'groups')">群组 3</button>
        </div>
        <div class="search"><input placeholder="搜索成员 / 群组…" /></div>
        <div class="list" id="rosterList"></div>
      </div>

      <!-- conversation -->

          </div>
          <div>
            <div class="nm" id="cvName">赵敏 · 设计部</div>

          <div class="cv-actions">
            <button class="accent" title="发送文件"><svg viewBox="0 0 24 24"><path d="M21 12.5V7a2 2 0 0 0-2-2h-6l-2-2H5a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h7"/><path d="M19 16v6M16 19h6"/></svg></button>

            <button id="dockBtn" title="停靠到屏幕边缘（抽屉式）"><svg viewBox="0 0 24 24"><path d="M3 3h18v18H3z"/><path d="M15 3v18"/></svg></button>

            <button title="@提及"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M16 12v1.5a2.5 2.5 0 0 0 5 0V12a9 9 0 1 0-3.5 7.1"/></svg></button>
            <button title="发送文件"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></button>
            <button title="截图"><svg viewBox="0 0 24 24"><path d="M9 3h6l2 3h3a1 1 0 0 1 1 1v12a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V7a1 1 0 0 1 1-1h3z"/><circle cx="12" cy="13" r="3.5"/></svg></button>

  </div>
  <!-- statusbar -->
  <div class="statusbar">

    <span>P2P 直连 · 局域网 192.168.1.0/24</span>
    <span style="color:var(--taomni-text-muted)">提示:右上 ⤢ 弹出独立窗口 · ▭ 停靠到四面抽屉 · 抽屉移出鼠标自动收起,点边缘标签恢复,右键"—"关闭 · Esc 关闭浮窗/抽屉</span>
    <span class="sp">无服务器 · 去中心化</span>

<div class="hint" id="hint"></div>

<script>
const members=[
  {id:'zhao',nm:'赵敏 · 设计部',c:'linear-gradient(135deg,#10b981,#0ea5e9)',i:'赵',pres:'var(--ok)',st:'在线 · 192.168.1.24',pre:'白板的配色我调好了',tm:'09:41',un:0,sig:'设计即沟通'},
  {id:'qian',nm:'钱进 · 后端',c:'linear-gradient(135deg,#f59e0b,#ef4444)',i:'钱',pres:'var(--busy)',st:'忙碌 · 192.168.1.31',pre:'[文件] 部署脚本.tar.gz',tm:'09:38',un:2,sig:'勿扰，发版中'},
  {id:'sun',nm:'孙莉 · 测试',c:'linear-gradient(135deg,#8b5cf6,#6366f1)',i:'孙',pres:'var(--away)',st:'离开 · 192.168.1.46',pre:'@林开发 这个用例过了吗',tm:'昨天',un:1,sig:'测试一切'},
  {id:'li',nm:'李工 · 运维',c:'linear-gradient(135deg,#0ea5e9,#3b82f6)',i:'李',pres:'var(--ok)',st:'在线 · 192.168.1.12',pre:'服务器重启完成',tm:'昨天',un:0,sig:'稳定第一'},
  {id:'zhou',nm:'周哲',c:'linear-gradient(135deg,#ec4899,#8b5cf6)',i:'周',pres:'#94a3b8',st:'离线',pre:'明天见',tm:'周一',un:0,sig:''},
];
const groups=[
  {id:'g1',nm:'# 研发大群',c:'linear-gradient(135deg,#1e40af,#3b82f6)',i:'#',pres:'var(--ok)',st:'12 人 · 5 人在线',pre:'孙莉: 周会改到下午三点',tm:'09:50',un:5,sig:''},
  {id:'g2',nm:'# 前端小队',c:'linear-gradient(135deg,#16a34a,#10b981)',i:'#',pres:'var(--ok)',st:'5 人 · 3 人在线',pre:'你: 组件库更新了',tm:'09:20',un:0,sig:''},
  {id:'g3',nm:'# 临时排障',c:'linear-gradient(135deg,#f59e0b,#f97316)',i:'#',pres:'var(--away)',st:'4 人',pre:'李工: 已恢复',tm:'昨天',un:0,sig:''},
];
const threads={
  zhao:[
    {sep:'今天'},
    {who:'赵敏',av:'赵',c:'linear-gradient(135deg,#10b981,#0ea5e9)',t:'早呀，新版内网通讯的配色我调好了 ✨'},
    {me:1,t:'太好了！发我看看'},
    {who:'赵敏',av:'赵',c:'linear-gradient(135deg,#10b981,#0ea5e9)',img:1,cap:'palette-v2.png'},
    {who:'赵敏',av:'赵',c:'linear-gradient(135deg,#10b981,#0ea5e9)',file:{nm:'lanchat-设计规范.pdf',sz:'2.4 MB · 接收中 62%'}},
    {me:1,t:'收到，<span class="mention">@赵敏</span> 这个主色和我们 Taomni 的靛蓝很搭 👍'},
  ],
  qian:[
    {sep:'今天'},
    {who:'钱进',av:'钱',c:'linear-gradient(135deg,#f59e0b,#ef4444)',file:{nm:'部署脚本.tar.gz',sz:'18.6 MB · 局域网直传 完成'}},
    {who:'钱进',av:'钱',c:'linear-gradient(135deg,#f59e0b,#ef4444)',t:'发版脚本给你，跑之前先看 README'},
    {me:1,t:'好，正在下载'},
  ],
  sun:[{sep:'昨天'},{who:'孙莉',av:'孙',c:'linear-gradient(135deg,#8b5cf6,#6366f1)',t:'<span class="mention">@林开发</span> 这个用例过了吗？'}],
  li:[{sep:'昨天'},{who:'李工',av:'李',c:'linear-gradient(135deg,#0ea5e9,#3b82f6)',t:'服务器重启完成，可以联调了'}],
  zhou:[{sep:'周一'},{who:'周哲',av:'周',c:'linear-gradient(135deg,#ec4899,#8b5cf6)',t:'明天见'}],
  g1:[{sep:'今天'},
    {who:'孙莉',av:'孙',c:'linear-gradient(135deg,#8b5cf6,#6366f1)',t:'周会改到下午三点哈'},
    {who:'李工',av:'李',c:'linear-gradient(135deg,#0ea5e9,#3b82f6)',t:'收到 👌'},
    {me:1,t:'好的，<span class="mention">@全体成员</span> 记得带上各自的进度'}],
  g2:[{sep:'今天'},{me:1,t:'组件库更新了，记得拉最新'}],
  g3:[{sep:'昨天'},{who:'李工',av:'李',c:'linear-gradient(135deg,#0ea5e9,#3b82f6)',t:'已恢复，收工'}],
};
let seg='members', active='zhao';
const $=s=>document.querySelector(s);

function renderRoster(){
  const data=seg==='members'?members:groups;
  let h=`<div class="grp-label">${seg==='members'?'局域网在线成员（mDNS 自动发现）':'我的群组 / 频道'}</div>`;
  data.forEach(m=>{
    h+=`<div class="item" data-active="${m.id===active}" onclick="openConv('${m.id}')">
      <div class="av" style="background:${m.c}">${m.i}<span class="pres" style="background:${m.pres}"></span></div>
      <div class="mid"><div class="top"><span class="nm">${m.nm}</span><span class="tm">${m.tm}</span></div>
      <div class="top"><span class="pre">${m.pre}</span>${m.un?`<span class="unread">${m.un}</span>`:''}</div></div>
    </div>`;
  });
  $('#rosterList').innerHTML=h;
}
function renderThread(id){
  const t=threads[id]||[];let h='';
  t.forEach(m=>{
    if(m.sep){h+=`<div class="daysep">${m.sep}</div>`;return;}
    if(m.me){
      let inner=m.t?`<div>${m.t}</div>`:'';
      h+=`<div class="msg me"><div class="av" style="background:linear-gradient(135deg,#6366f1,#1e40af)">我</div><div class="bubble">${inner}</div></div>`;
    }else{
      let inner='';
      if(m.t)inner=`<div>${m.t}</div>`;
      if(m.img)inner=`<div class="imgmsg">🖼 ${m.cap}</div>`;
      if(m.file)inner=`<div class="filecard"><div class="fi"><svg viewBox="0 0 24 24"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><path d="M13 2v7h7"/></svg></div>
        <div class="meta"><div class="fn">${m.file.nm}</div><div class="fsz">${m.file.sz}</div><div class="progress"><i></i></div></div></div>`;
      h+=`<div class="msg"><div class="av" style="background:${m.c}">${m.av}</div><div class="bubble"><div class="who">${m.who}</div>${inner}</div></div>`;
    }
  });
  const el=$('#thread');el.innerHTML=h;el.scrollTop=el.scrollHeight;
}
function openConv(id){
  active=id;
  const m=(seg==='members'?members:groups).find(x=>x.id===id);
  if(m){$('#cvName').textContent=m.nm;$('#cvSt').textContent=m.st;
    $('#cvAv').style.background=m.c;$('#cvAv').firstChild.textContent=m.i;}
  renderRoster();renderThread(id);
}
function switchSeg(btn,s){seg=s;document.querySelectorAll('.seg button').forEach(b=>b.dataset.active=(b===btn));
  active=(s==='members'?members:groups)[0].id;renderRoster();openConv(active);}

/* theme */
$('#themeBtn').onclick=()=>{const r=document.documentElement;
  r.dataset.appTheme=r.dataset.appTheme==='dark'?'light':'dark';};

/* toast */
let ht;function toast(t){const el=$('#hint');el.textContent=t;el.classList.add('show');
  clearTimeout(ht);ht=setTimeout(()=>el.classList.remove('show'),2200);}

/* ---- detach into independent floating window (QQ-like 弹出独立) ---- */
$('#detachBtn').onclick=()=>{
  if(document.querySelector('.float')){toast('该会话已弹出为独立窗口');return;}
  const w=document.createElement('div');w.className='float';
  w.style.left=(innerWidth/2-180)+'px';w.style.top=(innerHeight/2-220)+'px';
  const m=(seg==='members'?members:groups).find(x=>x.id===active);
  w.innerHTML=`<div class="fhead"><div class="av avatar" style="width:24px;height:24px;border-radius:7px;background:${m.c}">${m.i}</div>
    <div class="nm">${m.nm}</div><button class="x">✕</button></div>
    <div class="fbody" id="floatBody"></div>
    <div class="composer" style="padding:8px"><div class="row"><textarea style="height:34px" placeholder="独立窗口 · 输入消息…"></textarea><button class="btn primary" style="height:34px;padding:0 12px">发送</button></div></div>`;
  document.body.appendChild(w);
  // clone thread into float
  w.querySelector('#floatBody').innerHTML=$('#thread').innerHTML;
  w.querySelector('.x').onclick=()=>w.remove();
  dragify(w,w.querySelector('.fhead'));
  toast('已弹出为独立窗口 · 可拖动标题栏移动（桌面版为真实 WebviewWindow）');
};
function dragify(win,handle){
  let sx,sy,ox,oy,drag=false;
  handle.addEventListener('mousedown',e=>{if(e.target.classList.contains('x'))return;
    drag=true;sx=e.clientX;sy=e.clientY;ox=win.offsetLeft;oy=win.offsetTop;e.preventDefault();});
  window.addEventListener('mousemove',e=>{if(!drag)return;
    win.style.left=Math.max(0,ox+e.clientX-sx)+'px';win.style.top=Math.max(0,oy+e.clientY-sy)+'px';});
  window.addEventListener('mouseup',()=>drag=false);
}

/* ---- QQ-style four-edge drawer (屏幕四面抽屉式) ---- */
let dockPop=null;
$('#dockBtn').onclick=(e)=>{
  if(dockPop){dockPop.remove();dockPop=null;return;}
  const r=e.currentTarget.getBoundingClientRect();
  dockPop=document.createElement('div');dockPop.className='pop';
  dockPop.style.left=Math.min(r.left,innerWidth-170)+'px';dockPop.style.top=(r.bottom+6)+'px';
  dockPop.innerHTML=`<div style="padding:4px 8px;color:var(--taomni-text-muted)">停靠到屏幕边缘</div>
    <button onclick="dock('top')">⬆ 顶部抽屉</button>
    <button onclick="dock('bottom')">⬇ 底部抽屉</button>
    <button onclick="dock('left')">⬅ 左侧抽屉</button>
    <button onclick="dock('right')">➡ 右侧抽屉</button>`;
  document.body.appendChild(dockPop);
};
document.addEventListener('click',e=>{if(dockPop&&!dockPop.contains(e.target)&&e.target.id!=='dockBtn'&&!e.target.closest('#dockBtn')){dockPop.remove();dockPop=null;}});

function dock(side){
  if(dockPop){dockPop.remove();dockPop=null;}
  document.querySelectorAll('.edge-drawer,.peek').forEach(n=>n.remove());
  const m=(seg==='members'?members:groups).find(x=>x.id===active);
  const d=document.createElement('div');d.className='edge-drawer';
  const horiz=(side==='left'||side==='right');
  const W=360,H=300;
  if(side==='left'){d.style.cssText+=`left:0;top:0;bottom:0;width:${W}px;border-right:1px solid var(--taomni-chrome-border)`;}
  if(side==='right'){d.style.cssText+=`right:0;top:0;bottom:0;width:${W}px;border-left:1px solid var(--taomni-chrome-border)`;}
  if(side==='top'){d.style.cssText+=`left:0;right:0;top:0;height:${H}px;border-bottom:1px solid var(--taomni-chrome-border)`;}
  if(side==='bottom'){d.style.cssText+=`left:0;right:0;bottom:0;height:${H}px;border-top:1px solid var(--taomni-chrome-border)`;}
  d.innerHTML=`<div class="dhead"><div class="av avatar" style="width:22px;height:22px;border-radius:6px;background:${m.c}">${m.i}</div>
    ${m.nm} · 边缘抽屉<button class="x" title="收起到边缘">—</button></div>
    <div class="dbody">${$('#thread').innerHTML}
      <div class="composer" style="border:1px solid var(--taomni-divider);border-radius:8px;padding:8px;margin-top:auto">
      <div class="row"><textarea style="height:32px" placeholder="抽屉内快速回复…"></textarea><button class="btn primary" style="height:32px;padding:0 12px">发送</button></div></div></div>`;
  document.body.appendChild(d);
  // peek tab
  const peek=document.createElement('div');peek.className='peek';
  const PT=34;
  if(side==='left'){peek.style.cssText+=`left:0;top:50%;transform:translateY(-50%);writing-mode:vertical-rl;width:${PT}px;height:120px;border-radius:0 10px 10px 0`;}
  if(side==='right'){peek.style.cssText+=`right:0;top:50%;transform:translateY(-50%);writing-mode:vertical-rl;width:${PT}px;height:120px;border-radius:10px 0 0 10px`;}
  if(side==='top'){peek.style.cssText+=`top:0;left:50%;transform:translateX(-50%);height:${PT}px;width:150px;border-radius:0 0 10px 10px`;}
  if(side==='bottom'){peek.style.cssText+=`bottom:0;left:50%;transform:translateX(-50%);height:${PT}px;width:150px;border-radius:10px 10px 0 0`;}
  peek.innerHTML=`💬 内网通讯`;peek.style.display='none';
  document.body.appendChild(peek);
  // hide/show animations
  const hideTransform={left:'translateX(-100%)',right:'translateX(100%)',top:'translateY(-100%)',bottom:'translateY(100%)'}[side];
  let open=true;
  function setOpen(o){open=o;
    if(o){d.style.transform='none';peek.style.display='none';}
    else{d.style.transform=hideTransform;peek.style.display='flex';}}
  d.querySelector('.x').onclick=()=>setOpen(false);
  peek.onclick=()=>setOpen(true);
  // auto-hide when mouse leaves (QQ behavior)
  let lt;d.addEventListener('mouseleave',()=>{lt=setTimeout(()=>setOpen(false),900);});
  d.addEventListener('mouseenter',()=>clearTimeout(lt));
  d.querySelector('.x').title='收起到边缘（鼠标移出自动收起，点击边缘标签恢复）';
  d.querySelector('.x').textContent='—';
  d.querySelector('.x').oncontextmenu=e=>{e.preventDefault();d.remove();peek.remove();};
  toast(`已停靠到屏幕${({top:'顶部',bottom:'底部',left:'左侧',right:'右侧'})[side]} · 移出鼠标自动收起，点边缘标签弹出（右键标题"—"可彻底关闭）`);
}

/* Esc closes floating window / edge drawer / dock menu (keyboard affordance) */
document.addEventListener('keydown',e=>{
  if(e.key!=='Escape')return;
  if(dockPop){dockPop.remove();dockPop=null;return;}
  const dr=document.querySelector('.edge-drawer'),pk=document.querySelector('.peek');
  if(dr){dr.remove();if(pk)pk.remove();return;}
  const fl=document.querySelector('.float');if(fl){fl.remove();}
});

renderRoster();renderThread(active);
</script>
