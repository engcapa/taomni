<!doctype html>
<html lang="zh" data-app-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>协作白板 — 交互原型</title>
<style>
:root{
  --taomni-chrome-border:#cbd5e1;--taomni-titlebar-from:#e2e8f0;--taomni-titlebar-to:#cbd5e1;
  --taomni-accent:#1e40af;--taomni-accent-soft:#3b82f6;--taomni-panel-bg:#f8fafc;--taomni-card-bg:#ffffff;
  --taomni-card-border:#e2e8f0;--taomni-text:#0f172a;--taomni-text-muted:#64748b;--taomni-divider:#e2e8f0;
  --taomni-hover:#f1f5f9;--taomni-selected:#dbeafe;--taomni-selected-border:#93c5fd;--ok:#16a34a;
  --taomni-shadow-lg:0 16px 24px -4px rgba(15,23,42,.12),0 4px 8px -2px rgba(15,23,42,.06);
  --ui-font:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
}
[data-app-theme="dark"]{
  --taomni-chrome-border:#1e293b;--taomni-titlebar-from:#1e293b;--taomni-titlebar-to:#0f172a;
  --taomni-accent:#60a5fa;--taomni-accent-soft:#93c5fd;--taomni-panel-bg:#0f172a;--taomni-card-bg:#1e293b;
  --taomni-card-border:#334155;--taomni-text:#f8fafc;--taomni-text-muted:#94a3b8;--taomni-divider:#1e293b;
  --taomni-hover:#1e293b;--taomni-selected:#1e3a8a;--taomni-selected-border:#3b82f6;
  --taomni-shadow-lg:0 16px 24px -4px rgba(0,0,0,.5),0 4px 8px -2px rgba(0,0,0,.25);
}
*{box-sizing:border-box}html,body{height:100%}
body{margin:0;font-family:var(--ui-font);font-size:12px;color:var(--taomni-text);
  background:var(--taomni-panel-bg);display:flex;flex-direction:column;overflow:hidden}
.titlebar{display:flex;align-items:center;gap:9px;height:36px;flex:0 0 36px;padding:0 12px;
  background:linear-gradient(to bottom,var(--taomni-titlebar-from),var(--taomni-titlebar-to));
  border-bottom:1px solid var(--taomni-chrome-border);user-select:none}
.logo{width:15px;height:15px;border-radius:4px;background:linear-gradient(135deg,var(--taomni-accent-soft),var(--taomni-accent))}
.titlebar .t{font-weight:600}
.peers{margin-left:10px;display:flex;align-items:center}
.peers .pa{width:24px;height:24px;border-radius:50%;display:grid;place-items:center;color:#fff;font-size:11px;
  margin-left:-7px;border:2px solid var(--taomni-panel-bg)}
.live{margin-left:12px;color:var(--ok);display:inline-flex;align-items:center;gap:5px;font-size:11px}
.live i{width:7px;height:7px;border-radius:50%;background:var(--ok)}
.wctrl{margin-left:auto;display:flex}
.wctrl button{width:38px;height:36px;border:none;background:transparent;color:var(--taomni-text-muted);cursor:pointer}
.wctrl .close:hover{background:#c42b1c;color:#fff}
.main{flex:1;display:flex;min-height:0}
.tools{width:54px;flex:0 0 54px;background:var(--taomni-panel-bg);border-right:1px solid var(--taomni-divider);
  display:flex;flex-direction:column;align-items:center;padding-top:8px;gap:4px}
.tool{width:38px;height:38px;border-radius:9px;border:1px solid transparent;background:transparent;color:var(--taomni-text-muted);
  cursor:pointer;display:grid;place-items:center}
.tool:hover{background:var(--taomni-hover);color:var(--taomni-text)}
.tool[data-active="true"]{background:var(--taomni-selected);color:var(--taomni-accent);border-color:var(--taomni-selected-border)}
.swatches{display:flex;flex-direction:column;gap:6px;margin-top:8px}
.sw{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid var(--taomni-panel-bg);box-shadow:0 0 0 1px var(--taomni-divider)}
.sw[data-active="true"]{box-shadow:0 0 0 2px var(--taomni-accent)}
.canvaswrap{flex:1;position:relative;overflow:hidden;background:
  radial-gradient(circle,var(--taomni-divider) 1px,transparent 1px);background-size:22px 22px;background-color:var(--taomni-card-bg)}
canvas{position:absolute;inset:0;width:100%;height:100%;cursor:crosshair}
.cursor{position:absolute;pointer-events:none;z-index:5;transition:left .25s linear,top .25s linear}
.cursor svg{width:18px;height:18px}
.cursor .lab{position:absolute;left:14px;top:14px;color:#fff;font-size:10px;padding:1px 6px;border-radius:6px;white-space:nowrap}
.topbar{position:absolute;top:10px;left:50%;transform:translateX(-50%);display:flex;gap:6px;z-index:6;
  background:var(--taomni-card-bg);border:1px solid var(--taomni-card-border);border-radius:10px;padding:5px;
  box-shadow:var(--taomni-shadow-lg)}
.topbar button{border:none;background:transparent;color:var(--taomni-text);padding:6px 10px;border-radius:7px;cursor:pointer}
.topbar button:hover{background:var(--taomni-hover)}
.crdt{position:absolute;right:10px;bottom:10px;z-index:6;color:var(--taomni-text-muted);font-size:11px;
  background:var(--taomni-card-bg);border:1px solid var(--taomni-card-border);border-radius:8px;padding:5px 9px}
svg{stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.tool svg,.wctrl svg{width:18px;height:18px}
</style>
</head>
<body>
<div class="titlebar">
  <span class="logo"></span><span class="t">协作白板 · 架构脑暴</span>
  <div class="peers" id="peers"></div>
  <span class="live"><i></i> Yjs 已同步 · 4 人在线</span>
  <span style="margin-left:12px;color:var(--taomni-text-muted)">P2P 广播 · CRDT 合并</span>
  <div class="wctrl"><button id="theme" title="明暗">◐</button><button>—</button><button>▢</button><button class="close" onclick="alert('关闭白板（原型）')">✕</button></div>
</div>
<div class="main">
  <div class="tools">
    <button class="tool" data-active="true" title="选择" onclick="pick(this,'sel')"><svg viewBox="0 0 24 24"><path d="M3 3l7 17 2-7 7-2z"/></svg></button>
    <button class="tool" title="画笔" onclick="pick(this,'pen')"><svg viewBox="0 0 24 24"><path d="M12 19l7-7 3 3-7 7-3-3zM18 13l-1.5-1.5M2 22l4-1 12-12-3-3L3 18z"/></svg></button>
    <button class="tool" title="矩形" onclick="pick(this,'rect')"><svg viewBox="0 0 24 24"><rect x="4" y="5" width="16" height="14" rx="2"/></svg></button>
    <button class="tool" title="椭圆" onclick="pick(this,'ellipse')"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/></svg></button>
    <button class="tool" title="箭头" onclick="pick(this,'arrow')"><svg viewBox="0 0 24 24"><path d="M5 12h14M13 6l6 6-6 6"/></svg></button>
    <button class="tool" title="文字" onclick="pick(this,'text')"><svg viewBox="0 0 24 24"><path d="M4 7V5h16v2M9 19h6M12 5v14"/></svg></button>
    <button class="tool" title="便签" onclick="pick(this,'note')"><svg viewBox="0 0 24 24"><path d="M4 4h16v12l-4 4H4z"/><path d="M16 20v-4h4"/></svg></button>
    <button class="tool" title="橡皮擦" onclick="pick(this,'erase')"><svg viewBox="0 0 24 24"><path d="M20 20H7L3 16a2 2 0 0 1 0-3l9-9a2 2 0 0 1 3 0l5 5a2 2 0 0 1 0 3l-7 7"/></svg></button>
    <div class="swatches" id="swatches"></div>
  </div>
  <div class="canvaswrap" id="wrap">
    <canvas id="cv"></canvas>
    <div class="topbar">
      <button onclick="undo()">↶ 撤销</button><button onclick="redo()">↷ 重做</button>
      <button onclick="clearAll()">🗑 清空</button><button>⤓ 导出 PNG</button>
    </div>
    <!-- remote cursors -->
    <div class="cursor" id="c1" style="left:38%;top:30%"><svg viewBox="0 0 24 24" style="fill:#10b981;stroke:#fff"><path d="M3 3l7 17 2-7 7-2z"/></svg><span class="lab" style="background:#10b981">赵敏</span></div>
    <div class="cursor" id="c2" style="left:64%;top:55%"><svg viewBox="0 0 24 24" style="fill:#f59e0b;stroke:#fff"><path d="M3 3l7 17 2-7 7-2z"/></svg><span class="lab" style="background:#f59e0b">钱进</span></div>
    <div class="crdt">本地 Lamport: <b id="lam">142</b> · 元素 <b id="cnt">0</b></div>
  </div>
</div>
<script>
const colors=['#1e40af','#ef4444','#10b981','#f59e0b','#8b5cf6','#0f172a','#ec4899'];
let color=colors[0],tool='sel';
document.getElementById('swatches').innerHTML=colors.map((c,i)=>`<div class="sw" data-active="${i===0}" style="background:${c}" onclick="setColor('${c}',this)"></div>`).join('');
const peopleAv=[['赵','#10b981'],['钱','#f59e0b'],['我','#1e40af'],['李','#0ea5e9']];
document.getElementById('peers').innerHTML=peopleAv.map(p=>`<div class="pa" style="background:${p[1]}">${p[0]}</div>`).join('');
function pick(b,t){tool=t;document.querySelectorAll('.tool').forEach(x=>x.dataset.active=(x===b));}
function setColor(c,el){color=c;document.querySelectorAll('.sw').forEach(s=>s.dataset.active=(s===el));}
document.getElementById('theme').onclick=()=>{const r=document.documentElement;r.dataset.appTheme=r.dataset.appTheme==='dark'?'light':'dark';draw();};

const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
let items=[],undone=[],lam=142;
function resize(){const w=document.getElementById('wrap');cv.width=w.clientWidth;cv.height=w.clientHeight;draw();}
window.addEventListener('resize',resize);
// seed with some shapes so it looks collaborative
items=[
 {t:'rect',x:90,y:90,w:150,h:80,c:'#1e40af'},
 {t:'text',x:110,y:135,s:'发现 mDNS',c:'#1e40af'},
 {t:'rect',x:330,y:90,w:150,h:80,c:'#10b981'},
 {t:'text',x:352,y:135,s:'P2P 直连',c:'#10b981'},
 {t:'rect',x:570,y:90,w:150,h:80,c:'#f59e0b'},
 {t:'text',x:590,y:135,s:'WebRTC/Yjs',c:'#f59e0b'},
 {t:'arrow',x:240,y:130,x2:330,y2:130,c:'#64748b'},
 {t:'arrow',x:480,y:130,x2:570,y2:130,c:'#64748b'},
 {t:'pen',pts:[[140,230],[200,210],[260,250],[330,215],[400,255]],c:'#ef4444'},
 {t:'note',x:470,y:220,w:160,h:90,s:'白板 = 会议协作画布'},
];
function draw(){
  const cssText=getComputedStyle(document.documentElement);
  ctx.clearRect(0,0,cv.width,cv.height);
  items.forEach(o=>{
    ctx.strokeStyle=o.c||'#1e40af';ctx.fillStyle=o.c||'#1e40af';ctx.lineWidth=2.5;
    if(o.t==='rect'){ctx.globalAlpha=.12;ctx.fillRect(o.x,o.y,o.w,o.h);ctx.globalAlpha=1;ctx.strokeRect(o.x,o.y,o.w,o.h);}
    if(o.t==='ellipse'){ctx.beginPath();ctx.ellipse(o.x+o.w/2,o.y+o.h/2,o.w/2,o.h/2,0,0,7);ctx.stroke();}
    if(o.t==='text'){ctx.font='600 14px Inter,sans-serif';ctx.fillText(o.s,o.x,o.y);}
    if(o.t==='arrow'){ctx.beginPath();ctx.moveTo(o.x,o.y);ctx.lineTo(o.x2,o.y2);ctx.stroke();
      const a=Math.atan2(o.y2-o.y,o.x2-o.x);ctx.beginPath();ctx.moveTo(o.x2,o.y2);
      ctx.lineTo(o.x2-10*Math.cos(a-.4),o.y2-10*Math.sin(a-.4));ctx.moveTo(o.x2,o.y2);
      ctx.lineTo(o.x2-10*Math.cos(a+.4),o.y2-10*Math.sin(a+.4));ctx.stroke();}
    if(o.t==='pen'){ctx.beginPath();o.pts.forEach((p,i)=>i?ctx.lineTo(p[0],p[1]):ctx.moveTo(p[0],p[1]));ctx.stroke();}
    if(o.t==='note'){ctx.fillStyle='#fde68a';ctx.fillRect(o.x,o.y,o.w,o.h);ctx.fillStyle='#78350f';
      ctx.font='12px Inter,sans-serif';wrap(o.s,o.x+10,o.y+22,o.w-20);}
  });
  document.getElementById('cnt').textContent=items.length;
  document.getElementById('lam').textContent=lam;
}
function wrap(t,x,y,max){const ws=t.split('');let line='',yy=y;for(const ch of ws){if(ctx.measureText(line+ch).width>max){ctx.fillText(line,x,yy);line=ch;yy+=16;}else line+=ch;}ctx.fillText(line,x,yy);}
// drawing
let drawing=false,cur=null;
cv.addEventListener('mousedown',e=>{const r=cv.getBoundingClientRect();const x=e.clientX-r.left,y=e.clientY-r.top;
  lam++;
  if(tool==='pen'){cur={t:'pen',pts:[[x,y]],c:color};items.push(cur);drawing=true;}
  else if(tool==='rect'||tool==='ellipse'){cur={t:tool,x,y,w:0,h:0,c:color};items.push(cur);drawing=true;}
  else if(tool==='arrow'){cur={t:'arrow',x,y,x2:x,y2:y,c:color};items.push(cur);drawing=true;}
  else if(tool==='text'){const s=prompt('文字内容：','双击编辑');if(s){items.push({t:'text',x,y,s,c:color});}draw();}
  else if(tool==='note'){items.push({t:'note',x,y,w:150,h:90,s:'便签…'});draw();}
  else if(tool==='erase'){items=items.filter(o=>!near(o,x,y));draw();}
});
cv.addEventListener('mousemove',e=>{if(!drawing||!cur)return;const r=cv.getBoundingClientRect();const x=e.clientX-r.left,y=e.clientY-r.top;
  if(cur.t==='pen')cur.pts.push([x,y]);
  else if(cur.t==='arrow'){cur.x2=x;cur.y2=y;}
  else{cur.w=x-cur.x;cur.h=y-cur.y;}draw();});
window.addEventListener('mouseup',()=>{drawing=false;cur=null;});
function near(o,x,y){const bx=o.x||(o.pts&&o.pts[0][0])||0,by=o.y||(o.pts&&o.pts[0][1])||0;return Math.abs(bx-x)<60&&Math.abs(by-y)<60;}
function undo(){if(items.length){undone.push(items.pop());draw();}}
function redo(){if(undone.length){items.push(undone.pop());draw();}}
function clearAll(){if(confirm('清空白板？(广播 wb-op clear)')){items=[];draw();}}
resize();
// animate remote cursors
function rc(id){const e=document.getElementById(id);setInterval(()=>{e.style.left=(15+Math.random()*70)+'%';e.style.top=(20+Math.random()*60)+'%';},2200+Math.random()*900);}
rc('c1');rc('c2');
setInterval(()=>{lam+=Math.floor(Math.random()*3);document.getElementById('lam').textContent=lam;},2000);
</script>
</body>
</html>
