<!doctype html>
<html lang="zh" data-app-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>内网会议 — 交互原型</title>
<style>
:root{
  --taomni-chrome-border:#cbd5e1;--taomni-titlebar-from:#e2e8f0;--taomni-titlebar-to:#cbd5e1;
  --taomni-accent:#1e40af;--taomni-accent-soft:#3b82f6;--taomni-panel-bg:#f8fafc;--taomni-card-bg:#ffffff;
  --taomni-card-border:#e2e8f0;--taomni-text:#0f172a;--taomni-text-muted:#64748b;--taomni-divider:#e2e8f0;
  --taomni-hover:#f1f5f9;--ok:#16a34a;--busy:#ef4444;
  --taomni-shadow-lg:0 16px 24px -4px rgba(15,23,42,.12),0 4px 8px -2px rgba(15,23,42,.06);
  --ui-font:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
}
[data-app-theme="dark"]{
  --taomni-chrome-border:#1e293b;--taomni-titlebar-from:#1e293b;--taomni-titlebar-to:#0f172a;
  --taomni-accent:#60a5fa;--taomni-accent-soft:#93c5fd;--taomni-panel-bg:#0f172a;--taomni-card-bg:#1e293b;
  --taomni-card-border:#334155;--taomni-text:#f8fafc;--taomni-text-muted:#94a3b8;--taomni-divider:#1e293b;
  --taomni-hover:#1e293b;--taomni-shadow-lg:0 16px 24px -4px rgba(0,0,0,.5),0 4px 8px -2px rgba(0,0,0,.25);
}
*{box-sizing:border-box}body{margin:0;font-family:var(--ui-font);font-size:12px;color:var(--taomni-text);
  background:#0b0f19;height:100vh;display:grid;place-items:center}
.win{width:min(960px,96vw);height:min(620px,94vh);background:var(--taomni-panel-bg);border-radius:14px;
  border:1px solid var(--taomni-chrome-border);box-shadow:var(--taomni-shadow-lg);display:flex;flex-direction:column;overflow:hidden}
.titlebar{display:flex;align-items:center;gap:9px;height:38px;flex:0 0 38px;padding:0 12px;cursor:move;
  background:linear-gradient(to bottom,var(--taomni-titlebar-from),var(--taomni-titlebar-to));
  border-bottom:1px solid var(--taomni-chrome-border);user-select:none}
.logo{width:15px;height:15px;border-radius:4px;background:linear-gradient(135deg,var(--taomni-accent-soft),var(--taomni-accent))}
.titlebar .t{font-weight:600}
.timer{margin-left:6px;color:var(--taomni-text-muted)}
.rec{margin-left:6px;display:inline-flex;align-items:center;gap:5px;color:var(--busy)}
.rec i{width:7px;height:7px;border-radius:50%;background:var(--busy);animation:b 1.4s infinite}
@keyframes b{50%{opacity:.3}}
.wctrl{margin-left:auto;display:flex;gap:0}
.wctrl button{width:38px;height:38px;border:none;background:transparent;color:var(--taomni-text-muted);cursor:pointer}
.wctrl button:hover{background:rgba(127,127,127,.16)}.wctrl .close:hover{background:#c42b1c;color:#fff}
.stage{flex:1;display:grid;gap:10px;padding:14px;grid-template-columns:repeat(3,1fr);grid-auto-rows:1fr;background:#070b14}
.tile{position:relative;border-radius:12px;overflow:hidden;display:grid;place-items:center;color:#fff;
  font-weight:600;border:2px solid transparent;background:#111827}
.tile[data-speaking="true"]{border-color:#22c55e;box-shadow:0 0 0 3px rgba(34,197,94,.25)}
.tile .nm{position:absolute;left:8px;bottom:8px;background:rgba(0,0,0,.5);padding:3px 8px;border-radius:7px;font-size:11px;
  display:flex;align-items:center;gap:6px}
.tile .mic{position:absolute;right:8px;bottom:8px;background:rgba(0,0,0,.5);width:24px;height:24px;border-radius:7px;
  display:grid;place-items:center}
.tile .ava{width:74px;height:74px;border-radius:50%;display:grid;place-items:center;font-size:26px}
.tile.screen{grid-column:span 2;grid-row:span 2;background:linear-gradient(135deg,#0f172a,#1e293b)}
.tile.screen .mock{width:86%;height:78%;border-radius:8px;background:
  repeating-linear-gradient(135deg,#1e293b,#1e293b 12px,#243044 12px,#243044 24px);display:grid;place-items:center;color:#94a3b8;font-size:12px;border:1px solid #334155}
.controls{flex:0 0 64px;display:flex;align-items:center;justify-content:center;gap:10px;
  background:var(--taomni-panel-bg);border-top:1px solid var(--taomni-divider)}
.ctl{width:46px;height:46px;border-radius:50%;border:1px solid var(--taomni-card-border);background:var(--taomni-card-bg);
  color:var(--taomni-text);cursor:pointer;display:grid;place-items:center;transition:all .15s}
.ctl:hover{background:var(--taomni-hover)}
.ctl[data-off="true"]{background:#374151;color:#9ca3af}
.ctl.end{width:64px;border-radius:24px;background:#c42b1c;border-color:#c42b1c;color:#fff}
.ctl.end:hover{background:#a91f12}
svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.note{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);color:#64748b;font-size:11px}
</style>
</head>
<body>
<div class="win" id="win">
  <div class="titlebar" id="bar">
    <span class="logo"></span><span class="t">内网会议 · # 研发大群</span>
    <span class="timer">12:48</span>
    <span class="rec"><i></i>本地录制</span>
    <span style="margin-left:14px;color:var(--taomni-text-muted)">P2P mesh · 局域网直连 · 无 STUN/TURN</span>
    <div class="wctrl"><button>—</button><button>▢</button><button class="close" onclick="alert('挂断并关闭（原型）')">✕</button></div>
  </div>
  <div class="stage" id="stage"></div>
  <div class="controls">
    <button class="ctl" id="mic" title="麦克风" onclick="tog(this)"><svg viewBox="0 0 24 24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v4"/></svg></button>
    <button class="ctl" id="cam" title="摄像头" onclick="tog(this)"><svg viewBox="0 0 24 24"><path d="M15 10l5-3v10l-5-3v2a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2z"/></svg></button>
    <button class="ctl" id="scr" title="共享屏幕" onclick="tog(this)"><svg viewBox="0 0 24 24"><path d="M3 4h18v12H3zM8 20h8M12 16v4"/></svg></button>
    <button class="ctl" title="协作白板" onclick="window.location='lanchat-whiteboard.html'"><svg viewBox="0 0 24 24"><path d="M3 4h18v12H3zM8 20h8M12 16v4M7 8h6M7 11h4"/></svg></button>
    <button class="ctl" title="成员"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.9M16 3.1a4 4 0 0 1 0 7.8"/></svg></button>
    <button class="ctl end" title="挂断" onclick="alert('已挂断（原型）')"><svg viewBox="0 0 24 24"><path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3 19.5 19.5 0 0 1-6-6 19.8 19.8 0 0 1-3-8.6A2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7c.1 1 .4 1.9.7 2.8a2 2 0 0 1-.5 2.1L8.1 9.9a16 16 0 0 0 6 6l1.3-1.3a2 2 0 0 1 2.1-.4c.9.3 1.8.6 2.8.7a2 2 0 0 1 1.7 2z"/></svg></button>
  </div>
</div>
<div class="note">原型：tile 高亮表示正在说话（基于 WebAudio 音量检测）。共享屏幕占据大格。</div>
<script>
const people=[
  {nm:'赵敏',c:'linear-gradient(135deg,#10b981,#0ea5e9)',screen:1},
  {nm:'林开发（我）',c:'linear-gradient(135deg,#6366f1,#1e40af)',sp:1},
  {nm:'钱进',c:'linear-gradient(135deg,#f59e0b,#ef4444)',mute:1},
  {nm:'李工',c:'linear-gradient(135deg,#0ea5e9,#3b82f6)'},
  {nm:'孙莉',c:'linear-gradient(135deg,#8b5cf6,#6366f1)',mute:1},
];
const micOff=`<svg viewBox="0 0 24 24"><path d="M1 1l22 22"/><path d="M9 9v3a3 3 0 0 0 5 1.6M15 9.3V4a3 3 0 0 0-5.7-1.3"/><path d="M17 12a5 5 0 0 1-.5 2.1M5 10v2a7 7 0 0 0 11 5.7"/></svg>`;
const micOn=`<svg viewBox="0 0 24 24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/></svg>`;
let html='';
people.forEach(p=>{
  html+=`<div class="tile ${p.screen?'screen':''}" data-speaking="${p.sp?'true':'false'}">
    ${p.screen?`<div class="mock">🖥 ${p.nm} 正在共享屏幕 · VS Code</div>`:`<div class="ava" style="background:${p.c}">${p.nm[0]}</div>`}
    <div class="nm">${p.sp?'🔊 ':''}${p.nm}</div>
    <div class="mic">${p.mute?micOff:micOn}</div></div>`;
});
document.getElementById('stage').innerHTML=html;
function tog(b){b.dataset.off=b.dataset.off==='true'?'false':'true';}
// drag
const win=document.getElementById('win'),bar=document.getElementById('bar');
let drag=false,sx,sy,ox,oy;win.style.position='fixed';
function place(){const r=win.getBoundingClientRect();win.style.left=r.left+'px';win.style.top=r.top+'px';
  document.body.style.display='block';win.style.margin='0';}
bar.addEventListener('mousedown',e=>{if(e.target.closest('.wctrl'))return;place();drag=true;sx=e.clientX;sy=e.clientY;ox=win.offsetLeft;oy=win.offsetTop;});
window.addEventListener('mousemove',e=>{if(!drag)return;win.style.left=Math.max(0,ox+e.clientX-sx)+'px';win.style.top=Math.max(0,oy+e.clientY-sy)+'px';});
window.addEventListener('mouseup',()=>drag=false);
// simulate speaker switching
let idx=1;setInterval(()=>{const tiles=[...document.querySelectorAll('.tile')];
  tiles.forEach(t=>t.dataset.speaking='false');idx=(idx+1)%tiles.length;
  if(!people[idx].mute)tiles[idx].dataset.speaking='true';},2600);
</script>
</body>
</html>
